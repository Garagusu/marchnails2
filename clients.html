<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#E91E8C">
<title>March Nails — Clients</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/core.css"><link rel="stylesheet" href="css/components.css">
<script src="js/supabase.js"></script><script src="js/utils.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-name">March <span>Nails</span></div><div class="brand-sub">Business Intelligence</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Analytics</div>
      <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-gauge-high"></i>Dashboard</a>
      <a class="nav-item" href="booking.html"><i class="fa-solid fa-calendar-check"></i>Booking</a>
      <a class="nav-item" href="reports.html"><i class="fa-solid fa-chart-column"></i>Reports</a>
      <a class="nav-item active" href="clients.html"><i class="fa-solid fa-users"></i>Clients</a>
      <a class="nav-item" href="staff.html"><i class="fa-solid fa-id-badge"></i>Staff</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div><div class="user-name">Admin</div><div class="user-role">Salon Owner</div></div>
        <button class="btn btn-ghost btn-icon" onclick="localStorage.removeItem('mn_auth');location.href='index.html'" style="margin-left:auto" title="Sign out"><i class="fa-solid fa-right-from-bracket" style="font-size:.8rem;color:var(--text3)"></i></button>
      </div>
    </div>
  </aside>
  <div class="main-area">
    <div class="topbar">
      <button class="btn btn-ghost btn-icon" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-title" id="page-title">Clients</div>
      <div class="topbar-date" id="tb-date"></div>
      <div style="margin-left:auto;display:flex;gap:.4rem">
        <button class="btn btn-primary" onclick="openEditClient(null)"><i class="fa-solid fa-user-plus"></i>Add Client</button>
      </div>
    </div>
    <div class="page-content" id="page-content"></div>
  </div>
</div>
<div id="toast-container"></div>
<script>
'use strict';
if (!localStorage.getItem('mn_auth')) location.href='index.html';

var STATE = {view:'list', selectedClient:null, search:'', tier:'all', staff:'all', svc:'all', minSpend:'', maxSpend:'', sortBy:'ltv', sortDir:-1};

window.addEventListener('DOMContentLoaded', function() {
  populateStaffDropdowns();
  Utils.startClock(null, document.getElementById('tb-date'));
  if (!SB.loadCacheFromStorage()) {
    if (SB.DEMO) {
      SB.CACHE.clients=JSON.parse(JSON.stringify(SB.DEMO.clients));
      SB.CACHE.payments=JSON.parse(JSON.stringify(SB.DEMO.payments));
      SB.CACHE.bookings=JSON.parse(JSON.stringify(SB.DEMO.bookings));
      SB.CACHE.email_log=JSON.parse(JSON.stringify(SB.DEMO.email_log));
      SB.saveCache();
    }
  }
  if (window.location.protocol !== 'file:') SB.loadAll().then(function(){SB.saveCache();renderPage();}).catch(function(){});
  renderPage();
});

function renderPage(){
  if (STATE.selectedClient) renderClientDetail(STATE.selectedClient);
  else renderClientList();
}

/* ── CLIENT LIST ── */
function renderClientList(){
  document.getElementById('page-title').textContent='Clients';

  // Build enriched client data
  var enriched = SB.CACHE.clients.map(function(c){
    var a=Utils.clientAnalytics(c.id, (c.first_name||'')+' '+(c.last_name||''), SB.CACHE.bookings, SB.CACHE.payments);
    return Object.assign({},c,{_ltv:a.ltv,_visits:a.totalVisits,_last:a.lastVisit,_first:a.firstVisit,_topSvc:a.topService,_topStaff:a.topStaff,_avgTicket:a.avgTicket,_freq:a.avgFrequencyDays,_noshow:a.noshow});
  });

  // Apply filters
  var filtered=enriched.filter(function(c){
    var name=((c.first_name||'')+' '+(c.last_name||'')).toLowerCase();
    if(STATE.search && name.indexOf(STATE.search.toLowerCase())===-1 && (c.email||'').toLowerCase().indexOf(STATE.search.toLowerCase())===-1 && (c.phone||'').indexOf(STATE.search)===-1) return false;
    if(STATE.tier!=='all' && c.tier!==STATE.tier) return false;
    if(STATE.staff!=='all' && c._topStaff!==STATE.staff) return false;
    if(STATE.svc!=='all' && c._topSvc!==STATE.svc) return false;
    if(STATE.minSpend && c._ltv < parseFloat(STATE.minSpend)) return false;
    if(STATE.maxSpend && c._ltv > parseFloat(STATE.maxSpend)) return false;
    return true;
  });

  // Sort
  filtered.sort(function(a,b){
    var av=a[STATE.sortBy]||0, bv=b[STATE.sortBy]||0;
    if(STATE.sortBy==='_last'||STATE.sortBy==='_first'){av=av?av.getTime():0;bv=bv?bv.getTime():0;}
    return (av>bv?1:av<bv?-1:0)*STATE.sortDir;
  });

  // KPIs
  var totalLTV=enriched.reduce(function(s,c){return s+c._ltv;},0);
  var vip=enriched.filter(function(c){return c.tier==='gold'||c.tier==='platinum';});
  var active=enriched.filter(function(c){return c._last&&(new Date()-c._last)<90*86400000;});

  var html='';
  // KPI strip
  html+='<div class="grid grid-4 mb-1">';
  [{l:'Total Clients',v:enriched.length,c:'var(--pink)',ic:'fa-users'},
   {l:'Active (90d)',v:active.length,c:'var(--green)',ic:'fa-user-check'},
   {l:'Gold/VIP',v:vip.length,c:'var(--amber)',ic:'fa-crown'},
   {l:'Total LTV',v:Utils.fCurrency(totalLTV),c:'var(--violet)',ic:'fa-chart-line'},
  ].forEach(function(k){html+='<div class="kpi-card" style="--kpi-color:'+k.c+'"><div class="kpi-icon"><i class="fa-solid '+k.ic+'"></i></div><div class="kpi-value">'+k.v+'</div><div class="kpi-label">'+k.l+'</div></div>';});
  html+='</div>';

  // Filters
  html+='<div class="card mb-1">';
  html+='<div style="display:grid;grid-template-columns:1fr 140px 120px 120px 100px 100px auto;gap:.5rem;align-items:center;padding:.5rem .75rem">';
  html+='<div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Search name, email, phone…" value="'+STATE.search+'" oninput="STATE.search=this.value;renderClientList()"></div>';
  html+='<select class="filter-select" onchange="STATE.tier=this.value;renderClientList()"><option value="all">All Tiers</option><option value="standard"'+(STATE.tier==='standard'?' selected':'')+'>Standard</option><option value="silver"'+(STATE.tier==='silver'?' selected':'')+'>Silver</option><option value="gold"'+(STATE.tier==='gold'?' selected':'')+'>Gold</option></select>';
  html+='<select class="filter-select" onchange="STATE.staff=this.value;renderClientList()"><option value="all">All Staff</option><option'+(STATE.staff==='Happy'?' selected':'')+'>Happy</option><option'+(STATE.staff==='Flower'?' selected':'')+'>Flower</option><option'+(STATE.staff==='Daisy'?' selected':'')+'>Daisy</option><option'+(STATE.staff==='Hannah'?' selected':'')+'>Hannah</option></select>';
  html+='<select class="filter-select" onchange="STATE.svc=this.value;renderClientList()"><option value="all">All Services</option><option>Acrylic Full Set</option><option>Acrylic Refill</option><option>Gel-X Extensions</option><option>Pedicure Shellac</option><option>Manicure Shellac</option></select>';
  html+='<input type="number" class="filter-select" placeholder="Min $" value="'+STATE.minSpend+'" oninput="STATE.minSpend=this.value;renderClientList()" style="min-width:80px">';
  html+='<input type="number" class="filter-select" placeholder="Max $" value="'+STATE.maxSpend+'" oninput="STATE.maxSpend=this.value;renderClientList()" style="min-width:80px">';
  html+='<button class="btn btn-sm" onclick="STATE.search=\'\';STATE.tier=\'all\';STATE.staff=\'all\';STATE.svc=\'all\';STATE.minSpend=\'\';STATE.maxSpend=\'\';renderClientList()"><i class="fa-solid fa-xmark"></i>Clear</button>';
  html+='</div></div>';

  // Sort controls
  html+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;padding:.4rem .75rem;border-bottom:1px solid var(--s1)">'
    +'<div style="font-size:.72rem;color:var(--text2)">'+filtered.length+' clients</div>'
    +'<div style="display:flex;gap:.25rem;align-items:center;font-size:.7rem;color:var(--text2)">Sort by: '
    +[['_ltv','Spend'],['_visits','Visits'],['_last','Last Visit'],['_first','First Visit'],['_avgTicket','Avg Ticket']].map(function(s){
      return '<button class="btn btn-sm'+(STATE.sortBy===s[0]?' btn-primary':'')+'" onclick="toggleSort(\''+s[0]+'\')" style="padding:.15rem .45rem;font-size:.65rem">'+s[1]+'</button>';
    }).join('')+'</div></div>';

  // Table
  html+='<div class="table-wrap"><table class="data-table"><thead><tr>'
    +'<th>Client</th><th>Tier</th><th>Visits</th><th>Total Spent</th><th>Avg Ticket</th>'
    +'<th>Last Visit</th><th>Fav Staff</th><th>Points</th><th>Actions</th></tr></thead><tbody>';

  var tierBadge={standard:'<span class="badge badge-blue">Standard</span>',silver:'<span class="badge badge-violet">★ Silver</span>',gold:'<span class="badge badge-gold">★★ Gold</span>',platinum:'<span class="badge badge-pink">Platinum</span>'};
  filtered.forEach(function(c){
    var name=(c.first_name||'')+' '+(c.last_name||'');
    var initials=(c.first_name?c.first_name[0]:'?')+(c.last_name?c.last_name[0]:'');
    html+='<tr style="cursor:pointer" onclick="openClient(\''+c.id+'\')">'
      +'<td><div style="display:flex;align-items:center;gap:7px">'
      +'<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#7C3AED);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;color:#fff">'+initials+'</div>'
      +'<div><div style="font-weight:500">'+name+'</div><div style="font-size:.65rem;color:var(--text2)">'+(c.email||c.phone||'')+'</div></div></div></td>'
      +'<td>'+(tierBadge[c.tier||'standard']||tierBadge.standard)+'</td>'
      +'<td>'+c._visits+'</td>'
      +'<td class="td-pos">'+Utils.fCurrency(c._ltv)+'</td>'
      +'<td>'+Utils.fCurrency(c._avgTicket)+'</td>'
      +'<td class="td-muted">'+(c._last?Utils.fDate(c._last,{month:'short',day:'numeric'}):'—')+'</td>'
      +'<td class="td-muted">'+(c._topStaff||'—')+'</td>'
      +'<td style="color:var(--amber);font-weight:600">'+(c.loyalty_points||0)+'</td>'
      +'<td style="text-align:center" onclick="event.stopPropagation()">'
      +'<div style="display:flex;gap:.2rem;justify-content:center">'
      +'<button title="Edit" onclick="openEditClient(\''+c.id+'\''+')" style="width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-pen" style="font-size:.62rem;color:var(--text2)"></i></button>'
      +'<button title="Delete" onclick="askDeleteClient(\''+c.id+'\''+')" style="width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center"><i class="fa-solid fa-trash" style="font-size:.62rem;color:var(--red)"></i></button>'
      +'</div></td></tr>';
  });
  if(!filtered.length)html+='<tr><td colspan="9" style="text-align:center;padding:2rem;color:var(--text3)">No clients match filters</td></tr>';
  html+='</tbody></table></div></div>';

  document.getElementById('page-content').innerHTML=html;
}

function toggleSort(key){if(STATE.sortBy===key)STATE.sortDir*=-1;else{STATE.sortBy=key;STATE.sortDir=-1;}renderClientList();}

/* ── CLIENT DETAIL ── */
function openClient(id){STATE.selectedClient=id;renderClientDetail(id);}
function backToList(){STATE.selectedClient=null;renderClientList();}

function renderClientDetail(id){
  var c=SB.CACHE.clients.find(function(x){return x.id===id;});
  if(!c)return;
  var name=(c.first_name||'')+' '+(c.last_name||'');
  var initials=(c.first_name?c.first_name[0]:'?')+(c.last_name?c.last_name[0]:'');
  document.getElementById('page-title').innerHTML='<button onclick="backToList()" style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:.8rem;margin-right:.5rem"><i class="fa-solid fa-arrow-left"></i></button>'+name;

  var a=Utils.clientAnalytics(c.id,name,SB.CACHE.bookings,SB.CACHE.payments);

  var html='';
  // Header
  html+='<div class="card mb-1"><div style="display:flex;align-items:center;gap:1rem">'
    +'<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--pink),#7C3AED);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:#fff">'+initials+'</div>'
    +'<div><div style="font-family:\'Syne\',sans-serif;font-size:1.1rem;font-weight:700">'+name+'</div>'
    +(c.email?'<div style="font-size:.75rem;color:var(--text2)"><i class="fa-solid fa-envelope fa-xs"></i> '+c.email+'</div>':'')
    +(c.phone?'<div style="font-size:.75rem;color:var(--text2)"><i class="fa-solid fa-phone fa-xs"></i> '+c.phone+'</div>':'')
    +(c.birthday?'<div style="font-size:.72rem;color:var(--amber)"><i class="fa-solid fa-cake-candles fa-xs"></i> '+Utils.fDate(c.birthday,{month:'long',day:'numeric'})+'</div>':'')+'</div>'
    +'<div style="margin-left:auto;display:flex;gap:.5rem">'
    +(c.allergy_notes?'<div style="background:var(--red-bg);border:1px solid #FECACA;border-radius:var(--rsm);padding:.4rem .6rem;font-size:.72rem;color:var(--red);max-width:200px"><i class="fa-solid fa-triangle-exclamation"></i> '+c.allergy_notes+'</div>':'')
    +(c.preferences?'<div style="background:var(--s1);border-radius:var(--rsm);padding:.4rem .6rem;font-size:.72rem;color:var(--text2);max-width:200px"><i class="fa-solid fa-heart" style="color:var(--pink)"></i> '+c.preferences+'</div>':'')
    +'</div></div></div>';

  // Analytics grid
  html+='<div class="grid grid-4 mb-1">';
  [{l:'Lifetime Value',v:Utils.fCurrency(a.ltv),c:'var(--pink)'},{l:'Total Visits',v:a.totalVisits,c:'var(--violet)'},
   {l:'Avg Ticket',v:Utils.fCurrency(a.avgTicket),c:'var(--blue)'},{l:'No-shows',v:a.noshow,c:'var(--red)'},
   {l:'Fav Service',v:a.topService,c:'var(--green)'},{l:'Fav Staff',v:a.topStaff,c:'var(--violet)'},
   {l:'Visit Freq',v:a.avgFrequencyDays?'Every '+a.avgFrequencyDays+'d':'—',c:'var(--amber)'},
   {l:'Loyalty Pts',v:(c.loyalty_points||0),c:'var(--amber)'},
  ].forEach(function(k){html+='<div class="kpi-card" style="--kpi-color:'+k.c+'"><div class="kpi-value" style="font-size:.95rem">'+k.v+'</div><div class="kpi-label">'+k.l+'</div></div>';});
  html+='</div>';

  // First/Last visit + top services
  html+='<div class="grid grid-2 mb-1">'
    +'<div class="card"><div class="card-header"><div class="card-title">Visit History</div></div>'
    +'<div style="padding:.5rem .75rem">'
    +'<div class="metric-row"><span style="color:var(--text2);font-size:.8rem">First Visit</span><span style="font-weight:600">'+(a.firstVisit?Utils.fDate(a.firstVisit,{month:'long',day:'numeric',year:'numeric'}):'—')+'</span></div>'
    +'<div class="metric-row"><span style="color:var(--text2);font-size:.8rem">Last Visit</span><span style="font-weight:600">'+(a.lastVisit?Utils.fDate(a.lastVisit,{month:'long',day:'numeric',year:'numeric'}):'—')+'</span></div>'
    +'<div class="metric-row"><span style="color:var(--text2);font-size:.8rem">Total Visits</span><span style="font-weight:600">'+a.totalVisits+'</span></div>'
    +'<div class="metric-row"><span style="color:var(--text2);font-size:.8rem">Completed</span><span style="font-weight:600">'+a.completed+'</span></div>'
    +'<div class="metric-row"><span style="color:var(--text2);font-size:.8rem">Avg Frequency</span><span style="font-weight:600">'+(a.avgFrequencyDays?'Every '+a.avgFrequencyDays+' days':'—')+'</span></div>'
    +'</div></div>'
    +'<div class="card"><div class="card-header"><div class="card-title">Favourite Services</div></div>'
    +'<div style="padding:.25rem 0">';
  a.topServices.forEach(function(sv,i){
    html+='<div style="display:flex;align-items:center;gap:.6rem;padding:.4rem .75rem;border-bottom:1px solid var(--s1)">'
      +'<div style="font-size:.62rem;font-weight:700;color:var(--text3);width:16px">'+(i+1)+'</div>'
      +'<div style="flex:1;font-size:.78rem;font-weight:500">'+sv.name+'</div>'
      +'<div class="badge badge-pink">'+sv.count+'x</div></div>';
  });
  if(!a.topServices.length)html+='<div style="padding:1rem;color:var(--text3);font-size:.78rem;text-align:center">No bookings yet</div>';
  html+='</div></div></div>';

  // Recent bookings
  html+='<div class="card"><div class="card-header"><div class="card-title">Booking History</div></div>'
    +'<div class="table-wrap"><table class="data-table"><thead><tr><th>Date</th><th>Time</th><th>Service</th><th>Staff</th><th>Price</th><th>Status</th><th>Payment</th></tr></thead><tbody>';
  var cbks=SB.CACHE.bookings.filter(function(b){return b.client_id===id||b.client_name===name;}).sort(function(a,b){return new Date(b.booked_at)-new Date(a.booked_at);});
  var SM2={pending:'badge-orange',confirmed:'badge-blue',arrived:'badge-green',in_progress:'badge-violet',completed:'badge-green',cancelled:'badge-grey','no-show':'badge-red'};
  cbks.slice(0,50).forEach(function(b){
    var dt=new Date(b.booked_at);
    html+='<tr><td class="td-muted">'+Utils.fDate(b.booked_at,{month:'short',day:'numeric',year:'numeric'})+'</td>'
      +'<td>'+dt.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})+'</td>'
      +'<td class="tds">'+(b.service_name||'—')+'</td><td class="td-muted">'+(b.staff_name||'—')+'</td>'
      +'<td class="td-pos">'+Utils.fCurrency(b.service_price||0)+'</td>'
      +'<td><span class="badge badge-'+(SM2[b.status]||'badge-grey')+'">'+(b.status||'—').replace('_',' ')+'</span></td>'
      +'<td class="td-muted">'+(b.payment_status==='paid'?'<span style="color:var(--green)">Paid</span>':'Unpaid')+'</td></tr>';
  });
  if(!cbks.length)html+='<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text3)">No booking history</td></tr>';
  html+='</tbody></table></div></div>';

  document.getElementById('page-content').innerHTML=html;
}
</script>

<!-- ADD CLIENT MODAL -->
<div id="add-client-modal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(26,29,46,.5);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem" onclick="if(event.target===this)closeAddClient()">
  <div style="background:var(--white);border-radius:var(--r-xl);width:100%;max-width:480px;box-shadow:var(--sh-xl);overflow:hidden">
    <div style="padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--pink),var(--violet))">
      <div style="display:flex;align-items:center;gap:.6rem">
        <i class="fa-solid fa-user-plus" style="color:#fff;font-size:.9rem"></i>
        <div style="font-family:var(--fontd);font-size:.95rem;font-weight:700;color:#fff">New Client</div>
      </div>
      <button onclick="closeAddClient()" style="width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:1.1rem">×</button>
    </div>
    <div style="padding:1.1rem 1.25rem" id="add-client-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.65rem">
        <div>
          <label style="font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.25rem">First Name *</label>
          <input id="ac-first" placeholder="Jane" style="width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;color:var(--text);box-sizing:border-box">
        </div>
        <div>
          <label style="font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.25rem">Last Name *</label>
          <input id="ac-last" placeholder="Smith" style="width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;color:var(--text);box-sizing:border-box">
        </div>
      </div>
      <div style="margin-bottom:.65rem">
        <label style="font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.25rem">Phone</label>
        <input id="ac-phone" type="tel" placeholder="613-555-0100" style="width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;color:var(--text);box-sizing:border-box">
      </div>
      <div style="margin-bottom:.65rem">
        <label style="font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.25rem">Email</label>
        <input id="ac-email" type="email" placeholder="jane@email.com" style="width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;color:var(--text);box-sizing:border-box">
      </div>
      <div style="margin-bottom:.65rem">
        <label style="font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.25rem">Birthday</label>

        <button onclick="closeAddClient()" style="padding:.45rem .9rem;border-radius:50px;border:1.5px solid var(--border);background:var(--white);font-size:.78rem;cursor:pointer;font-family:var(--font)">Cancel</button>
        <button onclick="saveNewClient()" style="padding:.45rem 1rem;border-radius:50px;border:none;background:linear-gradient(135deg,var(--pink),var(--violet));color:#fff;font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--font);display:flex;align-items:center;gap:.35rem"><i class="fa-solid fa-check"></i>Save Client</button>

<script>
function openAddClient(){
  document.getElementById('add-client-modal').style.display='flex';
  document.getElementById('ac-first').focus();
}
function closeAddClient(){
  document.getElementById('add-client-modal').style.display='none';
  ['ac-first','ac-last','ac-phone','ac-email','ac-bday','ac-notes'].forEach(function(id){
    var el=document.getElementById(id); if(el) el.value='';
  });
}
function saveNewClient(){
  var first=(document.getElementById('ac-first').value||'').trim();
  var last =(document.getElementById('ac-last').value||'').trim();
  if(!first||!last){ Utils.toast('First and last name required','warning'); return; }

  var phone=(document.getElementById('ac-phone').value||'').trim();
  var email=(document.getElementById('ac-email').value||'').trim();
  var bday =(document.getElementById('ac-bday').value||'').trim();
  var notes=(document.getElementById('ac-notes').value||'').trim();

  var newClient = {
    id:             'c_'+Date.now(),
    first_name:     first,
    last_name:      last,
    phone:          phone,
    email:          email,
    birthday:       bday||null,
    notes:          notes,
    tier:           'standard',
    loyalty_points: 0,
    no_show_count:  0,
    created_at:     new Date().toISOString()
  };

  SB.CACHE.clients.unshift(newClient);
  SB.saveCache();

  // Also save to Supabase
  SB.insert('clients', newClient).catch(function(){});

  Utils.toast(first+' '+last+' added!','success');
  closeAddClient();
  // Re-render client list
  if(typeof renderClients==='function') renderClients();
  else location.reload();
}
// Enter key support
document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('add-client-modal').style.display==='flex') saveNewClient();
});
</script>


<script>
// ── Responsive sidebar ──
(function(){
  function initSidebar(){
    var sb  = document.getElementById('sidebar');
    if(!sb) return;
    // Add dimmer
    var dimmer = document.createElement('div');
    dimmer.className = 'sidebar-dimmer';
    dimmer.id = 'sb-dimmer';
    dimmer.onclick = closeSidebar;
    document.body.appendChild(dimmer);

    // Hamburger buttons toggle
    document.querySelectorAll('[onclick*="sidebar.*classList.toggle"]').forEach(function(btn){
      btn.onclick = function(){ toggleSidebar(); };
    });
  }

  function toggleSidebar(){
    var sb = document.getElementById('sidebar');
    var d  = document.getElementById('sb-dimmer');
    if(!sb) return;
    var isOpen = sb.classList.contains('open');
    if(isOpen){ closeSidebar(); } else { openSidebar(); }
  }

  function openSidebar(){
    var sb = document.getElementById('sidebar');
    var d  = document.getElementById('sb-dimmer');
    if(sb) sb.classList.add('open');
    if(d)  d.classList.add('visible');
  }

  function closeSidebar(){
    var sb = document.getElementById('sidebar');
    var d  = document.getElementById('sb-dimmer');
    if(sb) sb.classList.remove('open');
    if(d)  d.classList.remove('visible');
  }

  // Close sidebar when a nav link is clicked (mobile)
  document.addEventListener('click', function(e){
    var link = e.target.closest('.nav-item');
    if(link && window.innerWidth <= 980) closeSidebar();
  });

  // Swipe to close sidebar
  var touchStartX = 0;
  document.addEventListener('touchstart', function(e){ touchStartX = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - touchStartX;
    if(dx < -60 && window.innerWidth <= 980) closeSidebar();
  }, {passive:true});

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initSidebar);
  } else {
    initSidebar();
  }
})();
</script>

      <button onclick="closeDeleteClient()" style="padding:.45rem .9rem;border-radius:50px;border:1.5px solid var(--border);background:var(--white);font-size:.78rem;cursor:pointer;font-family:var(--font)">Cancel</button>
      <button onclick="confirmDeleteClient()" style="padding:.45rem 1rem;border-radius:50px;border:none;background:var(--red);color:#fff;font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--font)">Delete</button>

<script>
var EDITING_CLIENT_ID=null,DELETING_CLIENT_ID=null;
function openEditClient(id){
  EDITING_CLIENT_ID=id||null;
  var c=id?SB.CACHE.clients.find(function(x){return x.id===id;}):null;
  document.getElementById('ecm-title').textContent=c?'Edit: '+(c.first_name||'')+' '+(c.last_name||''):'New Client';
  var body=document.getElementById('ecm-body'); body.innerHTML='';
  function fl(lbl,el){var d=document.createElement('div');d.style.marginBottom='.6rem';var l=document.createElement('label');l.style.cssText='font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.25rem';l.textContent=lbl;d.appendChild(l);d.appendChild(el);return d;}
  function ti(id2,type,val,ph){var i=document.createElement('input');i.id=id2;i.type=type||'text';i.value=val||'';i.placeholder=ph||'';i.style.cssText='width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;color:var(--text);box-sizing:border-box';i.onfocus=function(){this.style.borderColor='var(--pink)';};i.onblur=function(){this.style.borderColor='var(--border)';};return i;}
  function se(id2,opts,cur){var s=document.createElement('select');s.id=id2;s.style.cssText='width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;background:var(--white);box-sizing:border-box';opts.forEach(function(o){var op=document.createElement('option');op.value=o.v||o.l;op.textContent=o.l;if((o.v||o.l)===cur)op.selected=true;s.appendChild(op);});return s;}
  function tx(id2,val,ph,h){var t=document.createElement('textarea');t.id=id2;t.value=val||'';t.placeholder=ph||'';t.style.cssText='width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;resize:vertical;min-height:'+(h||52)+'px;box-sizing:border-box';t.onfocus=function(){this.style.borderColor='var(--pink)';};t.onblur=function(){this.style.borderColor='var(--border)';};return t;}
  var r1=document.createElement('div');r1.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:.6rem';
  r1.appendChild(fl('First Name *',ti('ef-first','text',c?c.first_name:'','Jane')));
  r1.appendChild(fl('Last Name *',ti('ef-last','text',c?c.last_name:'','Smith')));
  body.appendChild(r1);
  var r2=document.createElement('div');r2.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:.6rem';
  r2.appendChild(fl('Phone',ti('ef-phone','tel',c?c.phone:'','613-555-0100')));
  r2.appendChild(fl('Email',ti('ef-email','email',c?c.email:'','jane@email.com')));
  body.appendChild(r2);
  var r3=document.createElement('div');r3.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:.6rem';
  r3.appendChild(fl('Birthday',ti('ef-bday','date',c?c.birthday:'')));
  r3.appendChild(fl('Instagram',ti('ef-ig','text',c?c.instagram:'','@username')));
  body.appendChild(r3);
  var r4=document.createElement('div');r4.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:.6rem';
  r4.appendChild(fl('Referred By',ti('ef-ref','text',c?c.referred_by:'','Client name')));
  r4.appendChild(fl('Tier',se('ef-tier',[{l:'Standard',v:'standard'},{l:'Silver',v:'silver'},{l:'Gold',v:'gold'},{l:'Platinum',v:'platinum'}],c?c.tier:'standard')));
  body.appendChild(r4);
  body.appendChild(fl('Allergies / Sensitivities',tx('ef-allergy',c?c.allergy_notes:'','e.g. Latex allergy, sensitive skin...')));
  body.appendChild(fl('Preferences',tx('ef-pref',c?c.preferences:'','e.g. Prefers short nails, likes French tip...')));
  body.appendChild(fl('Internal Notes',tx('ef-notes',c?c.notes:'','Private notes for staff...')));
  var r5=document.createElement('div');r5.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:.6rem';
  r5.appendChild(fl('Loyalty Points',ti('ef-pts','number',c?c.loyalty_points:'0')));
  r5.appendChild(fl('No-show Count',ti('ef-ns','number',c?c.no_show_count:'0')));
  body.appendChild(r5);
  var ft=document.createElement('div');ft.style.cssText='display:flex;gap:.5rem;justify-content:flex-end;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)';
  if(c){var bd=document.createElement('button');bd.style.cssText='padding:.45rem .9rem;border-radius:50px;border:1.5px solid var(--red-bd);background:var(--red-bg);color:var(--red);font-size:.78rem;cursor:pointer;font-family:var(--font);margin-right:auto';bd.textContent='Delete';bd.onclick=function(){closeEditClient();askDeleteClient(id);};ft.appendChild(bd);}
  var bc=document.createElement('button');bc.style.cssText='padding:.45rem .9rem;border-radius:50px;border:1.5px solid var(--border);background:var(--white);font-size:.78rem;cursor:pointer;font-family:var(--font)';bc.textContent='Cancel';bc.onclick=closeEditClient;ft.appendChild(bc);
  var bs=document.createElement('button');bs.style.cssText='padding:.45rem 1rem;border-radius:50px;border:none;background:linear-gradient(135deg,var(--pink),var(--violet));color:#fff;font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--font)';bs.textContent=c?'Save Changes':'Add Client';bs.onclick=saveEditClient;ft.appendChild(bs);
  body.appendChild(ft);
  var m=document.getElementById('edit-client-modal');m.style.display='flex';
  document.getElementById('ef-first').focus();
}
function closeEditClient(){document.getElementById('edit-client-modal').style.display='none';}
function saveEditClient(){
  var first=(document.getElementById('ef-first').value||'').trim();
  var last=(document.getElementById('ef-last').value||'').trim();
  if(!first||!last){Utils.toast('First and last name required','warning');return;}
  var data={first_name:first,last_name:last,phone:(document.getElementById('ef-phone').value||'').trim(),email:(document.getElementById('ef-email').value||'').trim(),birthday:document.getElementById('ef-bday').value||null,instagram:(document.getElementById('ef-ig').value||'').trim(),referred_by:(document.getElementById('ef-ref').value||'').trim(),tier:document.getElementById('ef-tier').value,allergy_notes:(document.getElementById('ef-allergy').value||'').trim(),preferences:(document.getElementById('ef-pref').value||'').trim(),notes:(document.getElementById('ef-notes').value||'').trim(),loyalty_points:parseInt(document.getElementById('ef-pts').value)||0,no_show_count:parseInt(document.getElementById('ef-ns').value)||0};
  if(EDITING_CLIENT_ID){var c=SB.CACHE.clients.find(function(x){return x.id===EDITING_CLIENT_ID;});if(c)Object.assign(c,data);SB.update('clients',EDITING_CLIENT_ID,data).catch(function(){});Utils.toast(first+' '+last+' updated','success');}
  else{data.id='c_'+Date.now();data.created_at=new Date().toISOString();SB.CACHE.clients.unshift(data);SB.insert('clients',data).catch(function(){});Utils.toast(first+' added!','success');}
  SB.saveCache();closeEditClient();
  if(STATE.selectedClient)renderClientDetail(STATE.selectedClient);else renderClientList();
}
function askDeleteClient(id){DELETING_CLIENT_ID=id;var c=SB.CACHE.clients.find(function(x){return x.id===id;});var name=c?(c.first_name+' '+c.last_name):'this client';document.getElementById('del-client-msg').textContent='Delete "'+name+'"? Booking history will be kept but the client profile will be removed.';document.getElementById('del-client-modal').style.display='flex';}
function closeDeleteClient(){document.getElementById('del-client-modal').style.display='none';DELETING_CLIENT_ID=null;}
function confirmDeleteClient(){if(!DELETING_CLIENT_ID)return;SB.CACHE.clients=SB.CACHE.clients.filter(function(x){return x.id!==DELETING_CLIENT_ID;});SB.remove('clients',DELETING_CLIENT_ID).catch(function(){});SB.saveCache();Utils.toast('Client deleted','info');closeDeleteClient();if(STATE.selectedClient===DELETING_CLIENT_ID)backToList();else renderClientList();}
function exportClients(){var rows=SB.CACHE.clients.map(function(c){var a=Utils.clientAnalytics(c.id,(c.first_name||'')+' '+(c.last_name||''),SB.CACHE.bookings,SB.CACHE.payments);return [c.first_name,c.last_name,c.phone,c.email,c.birthday,c.tier,a.ltv,a.totalVisits,c.loyalty_points,c.allergy_notes,c.preferences,c.notes,c.referred_by,c.instagram];});var csv='First Name,Last Name,Phone,Email,Birthday,Tier,LTV,Visits,Points,Allergies,Preferences,Notes,Referred By,Instagram\n'+rows.map(function(r){return r.map(function(v){return '"'+(v||'')+'"';}).join(',');}).join('\n');var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='clients-'+new Date().toISOString().slice(0,10)+'.csv';a.click();Utils.toast('Exported','success');}

// Populate staff dropdowns from localStorage (syncs with staff.html)
function populateStaffDropdowns(){
  var staffList = (function(){
    try{ var s=localStorage.getItem('mn_staff_cfg'); if(s){ var p=JSON.parse(s); if(p&&p.length) return p.filter(function(x){return x.status==='active'||!x.status;}); } }catch(e){}
    return [{name:'Happy'},{name:'Flower'},{name:'Daisy'},{name:'Hannah'}];
  })();
  document.querySelectorAll('select#f-staff, select#f-stafff').forEach(function(sel){
    var cur = sel.value;
    var opts = '<option value="all">All Staff</option>'
      + staffList.map(function(s){return '<option value="'+s.name+'"'+(cur===s.name?' selected':'')+'>'+s.name+'</option>';}).join('');
    sel.innerHTML = opts;
    if(cur) sel.value = cur;
  });
}

</script>
