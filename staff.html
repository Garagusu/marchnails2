<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#E91E8C">
<title>March Nails — Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/core.css"><link rel="stylesheet" href="css/components.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/supabase.js"></script><script src="js/utils.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-name">March <span>Nails</span></div><div class="brand-sub">Business Intelligence</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Analytics</div>
      <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-gauge-high"></i>Dashboard</a>
      <a class="nav-item" href="booking.html"><i class="fa-solid fa-calendar-check"></i>Booking</a>
      <a class="nav-item" href="reports.html"><i class="fa-solid fa-chart-column"></i>Reports</a>
      <a class="nav-item" href="clients.html"><i class="fa-solid fa-users"></i>Clients</a>
      <a class="nav-item active" href="staff.html"><i class="fa-solid fa-id-badge"></i>Staff</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div><div class="user-name">Admin</div><div class="user-role">Salon Owner</div></div>
        <button class="btn btn-ghost btn-icon" onclick="localStorage.removeItem('mn_auth');location.href='index.html'" style="margin-left:auto" title="Sign out"><i class="fa-solid fa-right-from-bracket" style="font-size:.8rem;color:var(--text3)"></i></button>
      </div>
    </div>
  </aside>
  <div class="main-area">
    <div class="topbar">
      <button class="btn btn-ghost btn-icon" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-title" id="page-title">Staff Performance</div>
      <div class="topbar-date" id="tb-date"></div>
      <div style="margin-left:auto;display:flex;gap:.4rem">
        <button class="btn btn-primary" onclick="openStaffModal(null)"><i class="fa-solid fa-user-plus"></i>Add Staff</button>
      </div>
    </div>
    <div class="page-content" id="page-content">
      <!-- Loaded dynamically -->
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script>
'use strict';
if (!localStorage.getItem('mn_auth')) location.href='index.html';

var DEFAULT_STAFF = [
  {id:'st1',name:'Happy', role:'Acrylic & Nail Art',    color:'#E91E8C', grad:'linear-gradient(135deg,#E91E8C,#C9184A)', phone:'', email:'', start_date:'2022-01-01', commission:25, days_off:[], notes:'', status:'active'},
  {id:'st2',name:'Flower',role:'Gel Extensions & Ombre',color:'#7C3AED', grad:'linear-gradient(135deg,#7C3AED,#4F46E5)', phone:'', email:'', start_date:'2022-03-01', commission:25, days_off:[], notes:'', status:'active'},
  {id:'st3',name:'Daisy', role:'Shellac & Chrome',      color:'#0891B2', grad:'linear-gradient(135deg,#06B6D4,#0284C7)', phone:'', email:'', start_date:'2023-01-01', commission:25, days_off:[], notes:'', status:'active'},
  {id:'st4',name:'Hannah',role:'Pedicure Specialist',   color:'#D97706', grad:'linear-gradient(135deg,#D97706,#B45309)', phone:'', email:'', start_date:'2023-06-01', commission:25, days_off:[], notes:'', status:'active'},
];
var STAFF_CFG = (function(){
  var stored = localStorage.getItem('mn_staff_cfg');
  if(stored){ try{ return JSON.parse(stored); }catch(e){} }
  return JSON.parse(JSON.stringify(DEFAULT_STAFF));
})();
function saveStaffCfg(){ localStorage.setItem('mn_staff_cfg', JSON.stringify(STAFF_CFG)); }

var STATE = {view:'overview', selectedStaff:null, period:'this_month', customStart:null, customEnd:null, svcFilter:'all'};

window.addEventListener('DOMContentLoaded', function() {
  Utils.startClock(null, document.getElementById('tb-date'));
  if (!SB.loadCacheFromStorage()) {
    if (SB.DEMO) {
      SB.CACHE.clients=JSON.parse(JSON.stringify(SB.DEMO.clients));
      SB.CACHE.payments=JSON.parse(JSON.stringify(SB.DEMO.payments));
      SB.CACHE.bookings=JSON.parse(JSON.stringify(SB.DEMO.bookings));
      SB.CACHE.email_log=JSON.parse(JSON.stringify(SB.DEMO.email_log));
      SB.saveCache();
    }
  }
  if (window.location.protocol !== 'file:') SB.loadAll().then(function(){SB.saveCache();renderPage();}).catch(function(){});
  renderPage();
});

function renderPage(){
  if (STATE.selectedStaff) renderStaffDetail(STATE.selectedStaff);
  else renderOverview();
}

/* ── OVERVIEW ── */
function renderOverview(){
  document.getElementById('page-title').textContent='Staff Performance';
  var range=Utils.getRange(STATE.period,STATE.customStart,STATE.customEnd);
  var html='';
  // Period filter
  html+='<div class="filter-bar" style="margin-bottom:1rem"><span class="filter-bar-label"><i class="fa-solid fa-filter" style="color:var(--pink)"></i></span>'
    +'<div class="filter-group">'
    +['today','yesterday','7d','this_month','last_month','this_year','all'].map(function(p){
      return '<button class="period-pill'+(STATE.period===p?' active':'')+'" onclick="STATE.period=\''+p+'\';renderPage()">'+
        ({today:'Today',yesterday:'Yesterday','7d':'7 Days',this_month:'This Month',last_month:'Last Month',this_year:'This Year',all:'All Time'}[p])+'</button>';
    }).join('')+'</div></div>';

  // Staff cards grid
  html+='<div class="grid grid-4 mb-1">';
  var PERIOD_MAP2={'today':'today','yesterday':'yesterday','7d':'this_week','this_month':'this_month','last_month':'last_month','this_year':'this_year','all':'all'};
  STAFF_CFG.forEach(function(sc){
    var analytics=Utils.staffAnalytics(sc.name,SB.CACHE.bookings,SB.CACHE.payments);
    var pKey2=PERIOD_MAP2[STATE.period]||STATE.period;
    var p=analytics[pKey2]||analytics.this_month;
    var all=analytics.all;
    html+='<div class="card" style="cursor:pointer;transition:transform .15s,box-shadow .15s" onclick="openStaff(\''+sc.name+'\')" onmouseover="this.style.transform=\'translateY(-3px)\';this.style.boxShadow=\'0 8px 24px rgba(0,0,0,.12)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'\'">'
      +'<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem">'
      +'<div style="width:44px;height:44px;border-radius:50%;background:'+sc.grad+';display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff">'+sc.name[0]+'</div>'
      +'<div><div style="font-size:.9rem;font-weight:700">'+sc.name+(sc.status&&sc.status!=='active'?' <span style="font-size:.62rem;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);border-radius:50px;padding:.05rem .35rem;font-weight:600;">'+sc.status.replace('_',' ')+'</span>':'')+'</div><div style="font-size:.7rem;color:var(--text2)">'+sc.role+'</div></div>'
      +'<div style="margin-left:auto"><i class="fa-solid fa-arrow-right" style="color:var(--text3);font-size:.8rem"></i></div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem">'
      +kpiMini('Revenue',Utils.fCurrency(p.revenue),sc.color)
      +kpiMini('Bookings',p.bookings,sc.color)
      +kpiMini('Commission '+(sc.commission||25)+'%',Utils.fCurrency(p.revenue*(sc.commission||25)/100),sc.color)
      +kpiMini('Net',Utils.fCurrency(p.revenue*(1-(sc.commission||25)/100)),sc.color)+'</div>'
      +'<div style="height:4px;background:var(--s1);border-radius:4px;overflow:hidden;margin-bottom:.5rem">'
      +'<div style="height:100%;border-radius:4px;background:'+sc.grad+';width:'+Math.min(100,Math.round((p.completed/(p.bookings||1))*100))+'%"></div></div>'
      +'<div style="display:flex;justify-content:space-between;align-items:center;font-size:.68rem;color:var(--text2)">'
      +'<span>'+Math.round((p.completed/(p.bookings||1))*100)+'% completion</span>'
      +'<span>'+analytics.totalClients+' clients</span></div>'
      +'<div style="margin-top:.6rem;display:flex;gap:.3rem">'
      +'<button class="btn btn-sm" onclick="event.stopPropagation();openStaffModal(\''+sc.id+'\''+')"><i class="fa-solid fa-pen"></i>Edit</button>'
      +'<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openScheduleManager(\''+sc.id+'\''+')"><i class="fa-solid fa-calendar-days"></i>Schedule</button>'
      +(sc.status&&sc.status!=='active'?'<span style="background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-bd);border-radius:50px;padding:.05rem .35rem;font-size:.62rem;font-weight:600">'+sc.status.replace(/_/g,' ')+'</span>':'')
      +'</div></div>';
  });
  html+='</div>';

  // Comparison table
  html+='<div class="card"><div class="card-header"><div class="card-title">Staff Comparison</div></div>'
    +'<div class="table-wrap"><table class="data-table" id="staff-cmp-table">'
    +'<thead><tr><th>Staff</th><th>Bookings</th><th>Completed</th><th>No-shows</th><th>Cancelled</th><th>Revenue</th><th>Commission</th><th>Net</th><th>Avg Ticket</th><th>Completion%</th></tr></thead><tbody>';
  // Map UI period labels to analytics keys
  var PERIOD_MAP={'today':'today','yesterday':'yesterday','7d':'this_week','this_month':'this_month','last_month':'last_month','this_year':'this_year','all':'all'};
  STAFF_CFG.forEach(function(sc){
    var a=Utils.staffAnalytics(sc.name,SB.CACHE.bookings,SB.CACHE.payments);
    var pKey=PERIOD_MAP[STATE.period]||STATE.period;
    var p=a[pKey]||a.this_month;
    // Use staff's own commission % (default 25 if not set)
    var commPct = (sc.commission||25) / 100;
    var commAmt = p.revenue * commPct;
    var netAmt  = p.revenue - commAmt;
    html+='<tr style="cursor:pointer" onclick="openStaff(\''+sc.name+'\')">'
      +'<td><div style="display:flex;align-items:center;gap:6px">'
      +'<div style="width:22px;height:22px;border-radius:50%;background:'+sc.grad+';display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff">'+sc.name[0]+'</div>'
      +sc.name+'<span style="font-size:.6rem;color:var(--text3);margin-left:.3rem">'+( sc.commission||25)+'%</span>'
      +'</div></td>'
      +'<td>'+p.bookings+'</td><td class="td-pos">'+p.completed+'</td>'
      +'<td '+(p.noshow>0?'class="td-neg"':'')+'>'+p.noshow+'</td>'
      +'<td class="td-muted">'+p.cancelled+'</td>'
      +'<td class="td-pos" style="font-weight:700">'+Utils.fCurrency(p.revenue)+'</td>'
      +'<td style="color:var(--amber);font-weight:600">'+Utils.fCurrency(commAmt)+' <span style="font-size:.62rem;opacity:.7">('+( sc.commission||25)+'%)</span></td>'
      +'<td class="td-pos" style="font-weight:700">'+Utils.fCurrency(netAmt)+'</td>'
      +'<td>'+Utils.fCurrency(p.avgTicket)+'</td>'
      +'<td>'+Math.round((p.completed/(p.bookings||1))*100)+'%</td></tr>';
  });
  html+='</tbody></table></div></div>';

  document.getElementById('page-content').innerHTML=html;
  Utils.makeSortable(document.getElementById('staff-cmp-table'));
}

function kpiMini(lbl,val,color){
  return '<div style="background:var(--s1);border-radius:6px;padding:.4rem .55rem">'
    +'<div style="font-size:.58rem;color:var(--text2);margin-bottom:1px">'+lbl+'</div>'
    +'<div style="font-size:.82rem;font-weight:700;color:'+color+'">'+val+'</div></div>';
}

/* ── STAFF DETAIL ── */
function openStaff(name){STATE.selectedStaff=name;STATE.period='this_month';renderStaffDetail(name);}
function backToOverview(){STATE.selectedStaff=null;renderOverview();}

function renderStaffDetail(name){
  var sc=STAFF_CFG.find(function(s){return s.name===name;});
  if(!sc)return;
  document.getElementById('page-title').innerHTML='<button onclick="backToOverview()" style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:.8rem;margin-right:.5rem"><i class="fa-solid fa-arrow-left"></i></button> '+name;

  var range=Utils.getRange(STATE.period,STATE.customStart,STATE.customEnd);
  var analytics=Utils.staffAnalytics(name,SB.CACHE.bookings,SB.CACHE.payments);
  var p=analytics[STATE.period]||analytics.this_month;
  var all=analytics.all;

  var html='';

  // Filters
  html+='<div class="filter-bar" style="margin-bottom:1rem">'
    +'<span class="filter-bar-label"><i class="fa-solid fa-filter" style="color:var(--pink)"></i></span>'
    +'<div class="filter-group">'
    +[['today','Today'],['yesterday','Yesterday'],['7d','7 Days'],['this_month','This Month'],['last_month','Last Month'],['this_year','This Year'],['all','All Time']].map(function(x){
      return '<button class="period-pill'+(STATE.period===x[0]?' active':'')+'" onclick="STATE.period=\''+x[0]+'\';renderStaffDetail(\''+name+'\')">'+x[1]+'</button>';
    }).join('')+'</div>'
    +'<div class="filter-sep"></div>'
    +'<select class="filter-select" onchange="STATE.svcFilter=this.value;renderStaffDetail(\''+name+'\')">'
    +'<option value="all">All Services</option>'
    +['Acrylic Full Set','Acrylic Refill','Gel-X Extensions','Pedicure Shellac','Manicure Shellac','Lash Extensions','Nail Art'].map(function(s){return '<option'+(STATE.svcFilter===s?' selected':'')+'>'+s+'</option>';}).join('')
    +'</select></div>';

  // Header card
  html+='<div class="card mb-1" style="background:linear-gradient(135deg,'+sc.color+'15,'+sc.color+'05);border:1.5px solid '+sc.color+'30">'
    +'<div style="display:flex;align-items:center;gap:1rem">'
    +'<div style="width:60px;height:60px;border-radius:50%;background:'+sc.grad+';display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:#fff">'+sc.name[0]+'</div>'
    +'<div><div style="font-family:\'Syne\',sans-serif;font-size:1.2rem;font-weight:700">'+sc.name+'</div>'
    +'<div style="font-size:.8rem;color:var(--text2)">'+sc.role+'</div>'
    +'<div style="font-size:.72rem;color:var(--text2);margin-top:2px">'+analytics.totalClients+' total clients · '+analytics.totalBookings+' total bookings</div>'
    +(sc.days_off&&sc.days_off.length?'<div style="font-size:.7rem;color:var(--amber);margin-top:2px"><i class="fa-solid fa-calendar-xmark fa-xs"></i> Days off: '+sc.days_off.join(', ')+'</div>':'')
    +(sc.notes?'<div style="font-size:.7rem;color:var(--text2);margin-top:2px"><i class="fa-solid fa-note-sticky fa-xs"></i> '+sc.notes+'</div>':'')
    +(sc.phone?'<div style="font-size:.7rem;color:var(--text2);margin-top:1px"><i class="fa-solid fa-phone fa-xs"></i> '+sc.phone+'</div>':'')
    +'</div>'
    +'<div style="margin-left:auto;display:flex;gap:.5rem">'
    +'<button class="btn btn-sm" onclick="openStaffModal(\''+sc.id+'\''+')"><i class="fa-solid fa-pen"></i>Edit</button>'
    +'<button class="btn btn-ghost btn-sm" onclick="openScheduleManager(\''+sc.id+'\''+')"><i class="fa-solid fa-calendar-days"></i>Schedule</button>'
    +'<div style="text-align:center;background:white;border-radius:var(--r);padding:.6rem .85rem;min-width:80px">'
    +'<div style="font-size:1rem;font-weight:700;color:'+sc.color+'">'+Utils.fCurrency(all.revenue)+'</div>'
    +'<div style="font-size:.62rem;color:var(--text2)">Lifetime Revenue</div></div>'
    +'<div style="text-align:center;background:white;border-radius:var(--r);padding:.6rem .85rem;min-width:80px">'
    +'<div style="font-size:1rem;font-weight:700;color:var(--pink)">'+Utils.fCurrency(all.commission)+'</div>'
    +'<div style="font-size:.62rem;color:var(--text2)">Lifetime Commission</div></div>'
    +'</div></div></div>';

  // KPI row - period breakdown
  var periods = [
    {key:'today',lbl:'Today'},
    {key:'yesterday',lbl:'Yesterday'},
    {key:'this_week',lbl:'This Week'},
    {key:'this_month',lbl:'This Month'},
    {key:'last_month',lbl:'Last Month'},
    {key:'this_year',lbl:'This Year'},
  ];
  html+='<div class="grid grid-4 mb-1">';
  [{l:'Revenue',v:Utils.fCurrency(p.revenue),c:'var(--pink)',ic:'fa-money-bill-trend-up'},
   {l:'Bookings',v:p.bookings,c:'var(--violet)',ic:'fa-calendar-check'},
   {l:'Completed',v:p.completed,c:'var(--green)',ic:'fa-check-circle'},
   {l:'Commission ('+(sc.commission||25)+'%)',v:Utils.fCurrency(p.revenue*(sc.commission||25)/100),c:'#E91E8C',ic:'fa-hand-holding-dollar'},
   {l:'Net Revenue',v:Utils.fCurrency(p.revenue*(1-(sc.commission||25)/100)),c:'var(--green)',ic:'fa-chart-line'},
   {l:'Avg Ticket',v:Utils.fCurrency(p.avgTicket),c:'var(--blue)',ic:'fa-ticket'},
   {l:'No-shows',v:p.noshow,c:'var(--red)',ic:'fa-user-slash'},
   {l:'Cancelled',v:p.cancelled,c:'var(--text2)',ic:'fa-ban'},
  ].forEach(function(k){
    html+='<div class="kpi-card" style="--kpi-color:'+k.c+'"><div class="kpi-icon"><i class="fa-solid '+k.ic+'"></i></div><div class="kpi-value">'+k.v+'</div><div class="kpi-label">'+k.l+'</div></div>';
  });
  html+='</div>';

  // Period breakdown table
  html+='<div class="grid grid-2 mb-1">';
  html+='<div class="card"><div class="card-header"><div class="card-title">Period Breakdown</div></div>'
    +'<div class="table-wrap"><table class="data-table"><thead><tr><th>Period</th><th>Bookings</th><th>Revenue</th><th>Commission</th></tr></thead><tbody>';
  periods.forEach(function(per){
    var pd=analytics[per.key]||{bookings:0,revenue:0,commission:0};
    var active=STATE.period===per.key;
    html+='<tr style="'+(active?'background:var(--pink-bg);font-weight:600':'')+'">'
      +'<td>'+per.lbl+'</td><td>'+pd.bookings+'</td>'
      +'<td class="td-pos">'+Utils.fCurrency(pd.revenue)+'</td>'
      +'<td style="color:var(--pink)">'+Utils.fCurrency(pd.commission)+'</td></tr>';
  });
  html+='</tbody></table></div></div>';

  // Top services
  html+='<div class="card"><div class="card-header"><div class="card-title">Top Services</div></div>'
    +'<div style="padding:.25rem 0">';
  analytics.topServices.forEach(function(sv,i){
    var w=analytics.topServices[0]?Math.round((sv.count/analytics.topServices[0].count)*100):0;
    html+='<div style="display:flex;align-items:center;gap:.6rem;padding:.45rem .75rem;border-bottom:1px solid var(--s1)">'
      +'<div style="width:18px;height:18px;border-radius:50%;background:'+sc.grad+';display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff">'+(i+1)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+sv.name+'</div>'
      +'<div style="height:4px;background:var(--s1);border-radius:2px;overflow:hidden;margin-top:3px"><div style="width:'+w+'%;height:100%;background:'+sc.grad+';border-radius:2px"></div></div></div>'
      +'<div style="font-size:.75rem;font-weight:600">'+sv.count+'</div></div>';
  });
  html+='</div></div></div>';

  // Recent bookings table
  var staffBks=Utils.filterBookings(SB.CACHE.bookings,{staff:name,range:range,service:STATE.svcFilter});
  html+='<div class="card"><div class="card-header"><div class="card-title">Appointments — '+(STATE.period.replace('_',' ').replace(/\b\w/g,function(c){return c.toUpperCase();}))+'</div>'
    +'<div class="table-info">'+staffBks.length+' appointments</div></div>'
    +'<div class="table-wrap"><table class="data-table" id="staff-bk-table">'
    +'<thead><tr><th>Date</th><th>Time</th><th>Client</th><th>Service</th><th>Price</th><th>Status</th><th>Payment</th></tr></thead><tbody>';
  var SM2={pending:'badge-orange',confirmed:'badge-blue',arrived:'badge-green',in_progress:'badge-violet',completed:'badge-green',cancelled:'badge-grey','no-show':'badge-red',no_show:'badge-red'};
  staffBks.slice(0,100).sort(function(a,b){return new Date(b.booked_at)-new Date(a.booked_at);}).forEach(function(b){
    var dt=new Date(b.booked_at);
    html+='<tr><td class="td-muted">'+Utils.fDate(b.booked_at,{month:'short',day:'numeric',year:'numeric'})+'</td>'
      +'<td>'+dt.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})+'</td>'
      +'<td class="tds">'+(b.client_name||'—')+'</td>'
      +'<td class="td-muted">'+(b.service_name||'—')+'</td>'
      +'<td class="td-pos">'+Utils.fCurrency(b.service_price||0)+'</td>'
      +'<td><span class="badge badge-'+((SM2[b.status])||'badge-grey')+'">'+(b.status||'—').replace('_',' ')+'</span></td>'
      +'<td class="td-muted">'+(b.payment_status==='paid'?'<span style="color:var(--green)">Paid</span>':'Unpaid')+'</td></tr>';
  });
  if(!staffBks.length)html+='<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text3)">No appointments in this period</td></tr>';
  html+='</tbody></table></div></div>';

  document.getElementById('page-content').innerHTML=html;
  Utils.makeSortable(document.getElementById('staff-bk-table'));
}
</script>

<script>
// ── Responsive sidebar ──
(function(){
  function initSidebar(){
    var sb  = document.getElementById('sidebar');
    if(!sb) return;
    // Add dimmer
    var dimmer = document.createElement('div');
    dimmer.className = 'sidebar-dimmer';
    dimmer.id = 'sb-dimmer';
    dimmer.onclick = closeSidebar;
    document.body.appendChild(dimmer);

    // Hamburger buttons toggle
    document.querySelectorAll('[onclick*="sidebar.*classList.toggle"]').forEach(function(btn){
      btn.onclick = function(){ toggleSidebar(); };
    });
  }

  function toggleSidebar(){
    var sb = document.getElementById('sidebar');
    var d  = document.getElementById('sb-dimmer');
    if(!sb) return;
    var isOpen = sb.classList.contains('open');
    if(isOpen){ closeSidebar(); } else { openSidebar(); }
  }

  function openSidebar(){
    var sb = document.getElementById('sidebar');
    var d  = document.getElementById('sb-dimmer');
    if(sb) sb.classList.add('open');
    if(d)  d.classList.add('visible');
  }

  function closeSidebar(){
    var sb = document.getElementById('sidebar');
    var d  = document.getElementById('sb-dimmer');
    if(sb) sb.classList.remove('open');
    if(d)  d.classList.remove('visible');
  }

  // Close sidebar when a nav link is clicked (mobile)
  document.addEventListener('click', function(e){
    var link = e.target.closest('.nav-item');
    if(link && window.innerWidth <= 980) closeSidebar();
  });

  // Swipe to close sidebar
  var touchStartX = 0;
  document.addEventListener('touchstart', function(e){ touchStartX = e.touches[0].clientX; }, {passive:true});
  document.addEventListener('touchend', function(e){
    var dx = e.changedTouches[0].clientX - touchStartX;
    if(dx < -60 && window.innerWidth <= 980) closeSidebar();
  }, {passive:true});

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', initSidebar);
  } else {
    initSidebar();
  }
})();
</script>

<script>
var EDITING_STAFF_ID=null, DELETING_STAFF_ID=null;

var STAFF_COLORS = ['#E91E8C','#7C3AED','#0891B2','#D97706','#059669','#EF4444','#F59E0B','#06B6D4'];
var DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

function openStaffModal(id){
  EDITING_STAFF_ID=id||null;
  var s=id?STAFF_CFG.find(function(x){return x.id===id;}):null;
  document.getElementById('sm-title').textContent=s?'Edit: '+s.name:'New Staff Member';
  var body=document.getElementById('sm-body'); body.innerHTML='';

  function fl(lbl,el){var d=document.createElement('div');d.style.marginBottom='.6rem';var l=document.createElement('label');l.style.cssText='font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.25rem';l.textContent=lbl;d.appendChild(l);d.appendChild(el);return d;}
  function ti(id2,type,val,ph){var i=document.createElement('input');i.id=id2;i.type=type||'text';i.value=val||'';i.placeholder=ph||'';i.style.cssText='width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;color:var(--text);box-sizing:border-box';i.onfocus=function(){this.style.borderColor='var(--pink)';};i.onblur=function(){this.style.borderColor='var(--border)';};return i;}
  function se(id2,opts,cur){var s2=document.createElement('select');s2.id=id2;s2.style.cssText='width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;background:var(--white);box-sizing:border-box';opts.forEach(function(o){var op=document.createElement('option');op.value=o.v||o.l;op.textContent=o.l;if((o.v||o.l)===cur)op.selected=true;s2.appendChild(op);});return s2;}
  function tx(id2,val,ph,h){var t=document.createElement('textarea');t.id=id2;t.value=val||'';t.placeholder=ph||'';t.style.cssText='width:100%;padding:.6rem .8rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font);outline:none;resize:vertical;min-height:'+(h||52)+'px;box-sizing:border-box';t.onfocus=function(){this.style.borderColor='var(--pink)';};t.onblur=function(){this.style.borderColor='var(--border)';};return t;}

  // Name + Role
  var r1=document.createElement('div');r1.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:.6rem';
  r1.appendChild(fl('Full Name *',ti('sf-name','text',s?s.name:'','e.g. Happy')));
  r1.appendChild(fl('Role / Specialty',ti('sf-role','text',s?s.role:'','e.g. Acrylic & Nail Art')));
  body.appendChild(r1);

  // Phone + Email
  var r2=document.createElement('div');r2.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:.6rem';
  r2.appendChild(fl('Phone',ti('sf-phone','tel',s?s.phone:'','613-555-0100')));
  r2.appendChild(fl('Email',ti('sf-email','email',s?s.email:'','staff@email.com')));
  body.appendChild(r2);

  // Start date + Commission
  var r3=document.createElement('div');r3.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:.6rem';
  r3.appendChild(fl('Start Date',ti('sf-start','date',s?s.start_date:'')));
  r3.appendChild(fl('Commission %',ti('sf-comm','number',s?s.commission:'25','25')));
  body.appendChild(r3);

  // Status + Color
  var r4=document.createElement('div');r4.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:.6rem';
  r4.appendChild(fl('Status',se('sf-status',[{l:'Active',v:'active'},{l:'On Leave',v:'on_leave'},{l:'Vacation',v:'vacation'},{l:'Day Off',v:'day_off'},{l:'Inactive',v:'inactive'}],s?s.status:'active')));
  // Color picker
  var colorDiv=document.createElement('div');colorDiv.style.marginBottom='.6rem';
  var colorLbl=document.createElement('label');colorLbl.style.cssText='font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.25rem';colorLbl.textContent='Color';
  var colorGrid=document.createElement('div');colorGrid.style.cssText='display:flex;flex-wrap:wrap;gap:.4rem';
  STAFF_COLORS.forEach(function(clr){
    var btn=document.createElement('button');btn.type='button';
    btn.style.cssText='width:28px;height:28px;border-radius:50%;background:'+clr+';border:3px solid '+(s&&s.color===clr?'#1A1D2E':'transparent')+';cursor:pointer;transition:border .1s';
    btn.onclick=function(){document.querySelectorAll('#sm-body .color-btn').forEach(function(b){b.style.border='3px solid transparent';});this.style.border='3px solid #1A1D2E';document.getElementById('sf-color').value=clr;};
    btn.className='color-btn';
    colorGrid.appendChild(btn);
  });
  var colorHidden=document.createElement('input');colorHidden.type='hidden';colorHidden.id='sf-color';colorHidden.value=s?s.color:STAFF_COLORS[0];
  colorDiv.appendChild(colorLbl);colorDiv.appendChild(colorGrid);colorDiv.appendChild(colorHidden);
  r4.appendChild(colorDiv);
  body.appendChild(r4);

  // Days off this week (checkboxes)
  var daysDiv=document.createElement('div');daysDiv.style.marginBottom='.6rem';
  var daysLbl=document.createElement('label');daysLbl.style.cssText='font-size:.63rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:.35rem';daysLbl.textContent='Days Off / Non-working Days';
  var daysGrid=document.createElement('div');daysGrid.style.cssText='display:flex;flex-wrap:wrap;gap:.35rem';
  var daysOff=s?s.days_off||[]:[];
  DAY_NAMES.forEach(function(day,i){
    var lbl=document.createElement('label');lbl.style.cssText='display:flex;align-items:center;gap:.25rem;padding:.25rem .55rem;border-radius:50px;border:1.5px solid var(--border);cursor:pointer;font-size:.72rem;font-weight:500;user-select:none;transition:all .12s';
    var chk=document.createElement('input');chk.type='checkbox';chk.value=day;chk.id='sf-day-'+i;chk.checked=daysOff.indexOf(day)!==-1;chk.style.display='none';
    if(chk.checked){lbl.style.background='var(--pink-bg)';lbl.style.borderColor='var(--pink)';lbl.style.color='var(--pink)';}
    chk.addEventListener('change',function(){if(this.checked){lbl.style.background='var(--pink-bg)';lbl.style.borderColor='var(--pink)';lbl.style.color='var(--pink)';}else{lbl.style.background='';lbl.style.borderColor='var(--border)';lbl.style.color='';}});
    lbl.appendChild(chk);lbl.appendChild(document.createTextNode(day.slice(0,3)));
    lbl.onclick=function(){chk.checked=!chk.checked;chk.dispatchEvent(new Event('change'));};
    daysGrid.appendChild(lbl);
  });
  daysDiv.appendChild(daysLbl);daysDiv.appendChild(daysGrid);body.appendChild(daysDiv);

  // Notes (vacation dates etc)
  body.appendChild(fl('Notes (vacation dates, schedule info...)',tx('sf-notes',s?s.notes:'','e.g. Vacation Jul 15-22, No Mondays until Aug...',52)));

  // Footer
  var ft=document.createElement('div');ft.style.cssText='display:flex;gap:.5rem;justify-content:flex-end;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)';
  if(s){var bd=document.createElement('button');bd.style.cssText='padding:.45rem .9rem;border-radius:50px;border:1.5px solid var(--red-bd);background:var(--red-bg);color:var(--red);font-size:.78rem;cursor:pointer;font-family:var(--font);margin-right:auto';bd.textContent='Remove Staff';bd.onclick=function(){closeStaffModal();askDelStaff(id);};ft.appendChild(bd);}
  var bc=document.createElement('button');bc.style.cssText='padding:.45rem .9rem;border-radius:50px;border:1.5px solid var(--border);background:var(--white);font-size:.78rem;cursor:pointer;font-family:var(--font)';bc.textContent='Cancel';bc.onclick=closeStaffModal;ft.appendChild(bc);
  var bs=document.createElement('button');bs.style.cssText='padding:.45rem 1rem;border-radius:50px;border:none;background:linear-gradient(135deg,var(--pink),var(--violet));color:#fff;font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--font)';bs.textContent=s?'Save Changes':'Add Staff Member';bs.onclick=saveStaffModal;ft.appendChild(bs);
  body.appendChild(ft);

  document.getElementById('staff-modal').style.display='flex';
  document.getElementById('sf-name').focus();
}

function closeStaffModal(){document.getElementById('staff-modal').style.display='none';}

function saveStaffModal(){
  var name=(document.getElementById('sf-name').value||'').trim();
  var role=(document.getElementById('sf-role').value||'').trim();
  if(!name){Utils.toast('Name required','warning');return;}

  var daysOff=[];
  DAY_NAMES.forEach(function(d,i){var chk=document.getElementById('sf-day-'+i);if(chk&&chk.checked)daysOff.push(d);});
  var color=document.getElementById('sf-color').value||STAFF_COLORS[0];
  var grad='linear-gradient(135deg,'+color+','+color+'BB)';

  var data={name:name,role:role||'Staff',phone:(document.getElementById('sf-phone').value||'').trim(),email:(document.getElementById('sf-email').value||'').trim(),start_date:document.getElementById('sf-start').value||null,commission:parseInt(document.getElementById('sf-comm').value)||25,status:document.getElementById('sf-status').value,color:color,grad:grad,days_off:daysOff,notes:(document.getElementById('sf-notes').value||'').trim()};

  if(EDITING_STAFF_ID){
    var s=STAFF_CFG.find(function(x){return x.id===EDITING_STAFF_ID;});
    if(s)Object.assign(s,data);
    Utils.toast(name+' updated','success');
  } else {
    data.id='staff_'+Date.now();
    STAFF_CFG.push(data);
    Utils.toast(name+' added to team!','success');
  }
  saveStaffCfg();
  closeStaffModal();
  renderPage();
}

function askDelStaff(id){
  DELETING_STAFF_ID=id;
  var s=STAFF_CFG.find(function(x){return x.id===id;});
  document.getElementById('del-staff-msg').textContent='Remove '+( s?s.name:'this staff member')+'? Their historical booking data will be kept.';
  document.getElementById('del-staff-modal').style.display='flex';
}
function closeDelStaff(){document.getElementById('del-staff-modal').style.display='none';DELETING_STAFF_ID=null;}
function confirmDelStaff(){
  if(!DELETING_STAFF_ID)return;
  STAFF_CFG=STAFF_CFG.filter(function(x){return x.id!==DELETING_STAFF_ID;});
  saveStaffCfg();
  Utils.toast('Staff member removed','info');
  closeDelStaff();
  if(STATE.selectedStaff){STATE.selectedStaff=null;}
  renderPage();
}
</script>

<!-- ════════════════════════════════════════════════
     STAFF SCHEDULE MANAGER
     - Calendar date picker
     - 21 vacation days/year (resets Jan 1)
     - Types: vacation, day_off, sick, personal, paperwork, training, busy_hours
     - Only vacation + day_off deduct from 21-day balance
     - Busy hours block booking in calendar
════════════════════════════════════════════════ -->

<div id="schedule-modal" style="display:none;position:fixed;inset:0;z-index:3000;background:rgba(26,29,46,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center;padding:1rem" onclick="if(event.target===this)closeSchedule()">
  <div style="background:var(--white);border-radius:var(--r-2xl);width:100%;max-width:760px;max-height:94vh;display:flex;flex-direction:column;box-shadow:var(--sh-xl);overflow:hidden">

    <!-- Header -->
    <div id="sch-hd" style="padding:1.1rem 1.5rem;background:linear-gradient(135deg,var(--pink),var(--violet));display:flex;align-items:center;gap:.85rem;flex-shrink:0">
      <div id="sch-av" style="width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff"></div>
      <div style="flex:1">
        <div id="sch-name" style="font-family:var(--fontd);font-size:1rem;font-weight:700;color:#fff"></div>
        <div id="sch-bal" style="font-size:.72rem;color:rgba(255,255,255,.85);margin-top:1px"></div>
      </div>
      <button onclick="closeSchedule()" style="width:32px;height:32px;border-radius:50%;border:none;background:rgba(255,255,255,.2);color:#fff;cursor:pointer;font-size:1.1rem">×</button>
    </div>

    <!-- Body -->
    <div style="display:flex;flex:1;overflow:hidden;min-height:0">

      <!-- Left: Calendar -->
      <div style="flex:1;display:flex;flex-direction:column;border-right:1px solid var(--border);min-width:0">
        <div style="padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg)">
          <button onclick="schPrevMonth()" style="width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:.8rem">‹</button>
          <div id="sch-month-lbl" style="font-family:var(--fontd);font-weight:700;font-size:.9rem"></div>
          <button onclick="schNextMonth()" style="width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);cursor:pointer;font-size:.8rem">›</button>
        </div>
        <!-- Day headers -->
        <div style="display:grid;grid-template-columns:repeat(7,1fr);padding:.5rem .75rem .25rem;gap:2px">
          <div style="text-align:center;font-size:.6rem;font-weight:700;color:var(--text3)">Mon</div>
          <div style="text-align:center;font-size:.6rem;font-weight:700;color:var(--text3)">Tue</div>
          <div style="text-align:center;font-size:.6rem;font-weight:700;color:var(--text3)">Wed</div>
          <div style="text-align:center;font-size:.6rem;font-weight:700;color:var(--text3)">Thu</div>
          <div style="text-align:center;font-size:.6rem;font-weight:700;color:var(--text3)">Fri</div>
          <div style="text-align:center;font-size:.6rem;font-weight:700;color:var(--text3)">Sat</div>
          <div style="text-align:center;font-size:.6rem;font-weight:700;color:var(--text3)">Sun</div>
        </div>
        <div id="sch-cal-grid" style="display:grid;grid-template-columns:repeat(7,1fr);padding:.25rem .75rem .75rem;gap:3px;overflow-y:auto;flex:1"></div>
      </div>

      <!-- Right: Form + Event List -->
      <div style="width:280px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden">
        <!-- Add event form -->
        <div style="padding:.85rem;border-bottom:1px solid var(--border);background:var(--bg)">
          <div style="font-size:.68rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem">Add Schedule Entry</div>
          <!-- Single date (default) -->
          <div id="sch-single-date" style="margin-bottom:.45rem">
            <label style="font-size:.62rem;color:var(--text2);font-weight:600;display:block;margin-bottom:.2rem">Date *</label>
            <input type="date" id="sch-date" style="width:100%;padding:.45rem .65rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.78rem;font-family:var(--font);outline:none;box-sizing:border-box">
          </div>
          <!-- Date range (vacation only) -->
          <div id="sch-range-dates" style="display:none;margin-bottom:.45rem">
            <label style="font-size:.62rem;color:var(--text2);font-weight:600;display:block;margin-bottom:.35rem">Vacation Period *</label>
            <div style="display:flex;gap:.4rem;align-items:center">
              <div style="flex:1">
                <div style="font-size:.58rem;color:var(--text3);margin-bottom:.15rem">From</div>
                <input type="date" id="sch-range-from" style="width:100%;padding:.45rem .65rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.78rem;font-family:var(--font);outline:none;box-sizing:border-box" oninput="schCalcDays()">
              </div>
              <div style="padding-top:1rem;color:var(--text3);font-size:.8rem">→</div>
              <div style="flex:1">
                <div style="font-size:.58rem;color:var(--text3);margin-bottom:.15rem">To</div>

            </div>
          </div>
          <div style="margin-bottom:.45rem">
            <label style="font-size:.62rem;color:var(--text2);font-weight:600;display:block;margin-bottom:.2rem">Type *</label>
            <select id="sch-type" onchange="schTypeChanged()" style="width:100%;padding:.45rem .65rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.78rem;font-family:var(--font);outline:none;background:var(--white);box-sizing:border-box">
              <optgroup label="Time Off (deducts from 21 days)">
                <option value="vacation">🌴 Vacation Day</option>
                <option value="day_off">🏠 Day Off</option>
              </optgroup>
              <optgroup label="Other Leave (does NOT deduct)">
                <option value="sick">🤒 Sick Day</option>
                <option value="personal">👤 Personal Day</option>
                <option value="training">📚 Training / Education</option>
                <option value="paperwork">📋 Paperwork / Admin</option>
                <option value="appointment">🏥 Medical Appointment</option>
              </optgroup>
              <optgroup label="Partial Day (blocks booking hours)">
                <option value="busy_hours">⏰ Busy Hours (blocks calendar)</option>
              </optgroup>
            </select>
          </div>
          <!-- Busy hours inputs (shown only for busy_hours type) -->
          <div id="sch-hours-row" style="display:none;margin-bottom:.45rem;display:flex;gap:.4rem;align-items:center;margin-bottom:.45rem">
            <div style="flex:1">
              <label style="font-size:.62rem;color:var(--text2);font-weight:600;display:block;margin-bottom:.2rem">From</label>
              <input type="time" id="sch-from" value="12:00" style="width:100%;padding:.45rem .65rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.78rem;font-family:var(--font);outline:none;box-sizing:border-box">
            </div>
            <div style="padding-top:1.2rem;color:var(--text3)">–</div>
            <div style="flex:1">
              <label style="font-size:.62rem;color:var(--text2);font-weight:600;display:block;margin-bottom:.2rem">To</label>
              <input type="time" id="sch-to" value="14:00" style="width:100%;padding:.45rem .65rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.78rem;font-family:var(--font);outline:none;box-sizing:border-box">
            </div>
          </div>
          <div style="margin-bottom:.6rem">
            <label style="font-size:.62rem;color:var(--text2);font-weight:600;display:block;margin-bottom:.2rem">Notes (optional)</label>
            <input type="text" id="sch-note" placeholder="e.g. Dental appointment 2pm" style="width:100%;padding:.45rem .65rem;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.78rem;font-family:var(--font);outline:none;box-sizing:border-box">
          </div>
          <button onclick="addScheduleEntry()" style="width:100%;padding:.5rem;border-radius:var(--r-sm);border:none;background:linear-gradient(135deg,var(--pink),var(--violet));color:#fff;font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--font)">
            Add Entry
          </button>
        </div>

        <!-- Event list for selected month -->
        <div style="flex:1;overflow-y:auto">
          <div style="padding:.5rem .85rem;border-bottom:1px solid var(--border);font-size:.68rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;background:var(--bg);display:flex;justify-content:space-between;align-items:center">
            <span>This Month</span>
            <span id="sch-month-count" style="font-weight:400;color:var(--text3)"></span>
          </div>
          <div id="sch-event-list" style="padding:.5rem"></div>
        </div>
      </div>
    </div>

    <!-- Footer: balance summary -->
    <div id="sch-footer" style="padding:.75rem 1.5rem;border-top:1px solid var(--border);background:var(--bg);display:flex;align-items:center;gap:1.5rem;flex-shrink:0;flex-wrap:wrap">
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
// STAFF SCHEDULE SYSTEM
// ════════════════════════════════════════
var SCH_STAFF_ID = null;
var SCH_YEAR = new Date().getFullYear();
var SCH_MONTH = new Date().getMonth(); // 0-indexed

var TYPE_CFG = {
  vacation:    {label:'Vacation',      icon:'🌴', color:'#7C3AED', bg:'#F5F3FF', deducts:true,  blocks:true},
  day_off:     {label:'Day Off',       icon:'🏠', color:'#0891B2', bg:'#ECFEFF', deducts:true,  blocks:true},
  sick:        {label:'Sick Day',      icon:'🤒', color:'#EF4444', bg:'#FEF2F2', deducts:false, blocks:true},
  personal:    {label:'Personal Day',  icon:'👤', color:'#D97706', bg:'#FFFBEB', deducts:false, blocks:true},
  training:    {label:'Training',      icon:'📚', color:'#059669', bg:'#ECFDF5', deducts:false, blocks:false},
  paperwork:   {label:'Paperwork',     icon:'📋', color:'#6B7280', bg:'#F9FAFB', deducts:false, blocks:false},
  appointment: {label:'Appointment',   icon:'🏥', color:'#EC4899', bg:'#FDF2F8', deducts:false, blocks:false},
  busy_hours:  {label:'Busy Hours',    icon:'⏰', color:'#F59E0B', bg:'#FFFBEB', deducts:false, blocks:true},
};
var ANNUAL_ALLOWANCE = 21; // vacation + day_off days per year

function getSchedule(staffId){ try{ return JSON.parse(localStorage.getItem('mn_sch_'+staffId)||'[]'); }catch(e){return[];} }
function saveSchedule(staffId, entries){ localStorage.setItem('mn_sch_'+staffId, JSON.stringify(entries)); }

function getVacationBalance(staffId){
  var year = SCH_YEAR;
  var entries = getSchedule(staffId);
  var used = entries.filter(function(e){
    return (e.type==='vacation'||e.type==='day_off') && e.date && e.date.startsWith(year+'');
  }).length;
  return {used:used, remaining:Math.max(0,ANNUAL_ALLOWANCE-used), allowance:ANNUAL_ALLOWANCE};
}

function openScheduleManager(staffId){
  SCH_STAFF_ID = staffId;
  var s = STAFF_CFG.find(function(x){return x.id===staffId;});
  if(!s) return;

  var av = document.getElementById('sch-av');
  av.textContent = s.name[0];
  av.style.background = s.grad;
  document.getElementById('sch-name').textContent = s.name + ' — Schedule';

  SCH_MONTH = new Date().getMonth();
  SCH_YEAR  = new Date().getFullYear();

  document.getElementById('schedule-modal').style.display='flex';
  schTypeChanged();
  renderSchCalendar();
}
function closeSchedule(){ document.getElementById('schedule-modal').style.display='none'; }

function schTypeChanged(){
  var type = document.getElementById('sch-type').value;
  var hoursRow    = document.getElementById('sch-hours-row');
  var singleDate  = document.getElementById('sch-single-date');
  var rangeDates  = document.getElementById('sch-range-dates');
  var isVacation  = type === 'vacation';
  var isBusy      = type === 'busy_hours';

  hoursRow.style.display   = isBusy     ? 'flex'  : 'none';
  singleDate.style.display = isVacation ? 'none'  : '';
  rangeDates.style.display = isVacation ? ''      : 'none';
  document.getElementById('sch-day-preview').style.display = 'none';
}

function schCalcDays(){
  var from = document.getElementById('sch-range-from').value;
  var to   = document.getElementById('sch-range-to').value;
  var preview = document.getElementById('sch-day-preview');
  if(!from || !to){ preview.style.display='none'; return; }
  if(to < from){ preview.style.display=''; preview.innerHTML='⚠️ End date must be after start date'; preview.style.background='var(--red-bg)'; preview.style.borderColor='var(--red-bd)'; preview.style.color='var(--red)'; return; }

  // Count working days (Mon-Sat, skip Sun)
  var days = 0;
  var cur = new Date(from+'T12:00:00');
  var end = new Date(to+'T12:00:00');
  while(cur <= end){
    if(cur.getDay() !== 0) days++; // skip Sunday
    cur.setDate(cur.getDate()+1);
  }

  var bal = getVacationBalance(SCH_STAFF_ID);
  var willRemain = bal.remaining - days;
  var isOver = willRemain < 0;

  preview.style.display = '';
  preview.style.background = isOver ? 'var(--red-bg)' : 'var(--violet-bg)';
  preview.style.borderColor = isOver ? 'var(--red-bd)' : 'var(--violet-bd)';
  preview.style.color = isOver ? 'var(--red)' : 'var(--violet)';
  preview.innerHTML = '🌴 <strong>'+days+' working days</strong>'
    +' · Balance: '+bal.remaining+' → '+(isOver?'<strong style="color:var(--red)">Exceeds by '+(days-bal.remaining)+'</strong>':willRemain+' remaining');
}

function renderSchCalendar(){
  var year=SCH_YEAR, month=SCH_MONTH;
  var monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('sch-month-lbl').textContent = monthNames[month]+' '+year;

  var entries = getSchedule(SCH_STAFF_ID);
  var balance = getVacationBalance(SCH_STAFF_ID);
  document.getElementById('sch-bal').textContent =
    'Vacation balance: '+balance.remaining+' / '+balance.allowance+' days remaining ('+year+')';

  // Footer summary
  var bal = balance;
  var totalSick=entries.filter(function(e){return e.type==='sick'&&e.date&&e.date.startsWith(year+'');}).length;
  document.getElementById('sch-footer').innerHTML =
    '<div style="display:flex;gap:1.5rem;flex-wrap:wrap">'
    +'<div style="text-align:center"><div style="font-size:1.2rem;font-weight:800;color:var(--violet)">'+bal.remaining+'</div><div style="font-size:.62rem;color:var(--text2)">Vacation Days Left</div></div>'
    +'<div style="text-align:center"><div style="font-size:1.2rem;font-weight:800;color:var(--blue)">'+bal.used+'</div><div style="font-size:.62rem;color:var(--text2)">Used This Year</div></div>'
    +'<div style="text-align:center"><div style="font-size:1.2rem;font-weight:800;color:var(--red)">'+totalSick+'</div><div style="font-size:.62rem;color:var(--text2)">Sick Days</div></div>'
    +'<div style="margin-left:auto;font-size:.7rem;color:var(--text3)">Vacation & Day Off deduct from '+ANNUAL_ALLOWANCE+' day allowance</div>'
    +'</div>';

  // Calendar grid
  var firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  var firstMon = (firstDay === 0 ? 6 : firstDay - 1); // offset for Mon start
  var daysInMonth = new Date(year, month+1, 0).getDate();
  var today = new Date();
  var todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');

  // Build day→entries map
  var dayMap = {};
  entries.forEach(function(e){
    if(e.date) { if(!dayMap[e.date]) dayMap[e.date]=[]; dayMap[e.date].push(e); }
  });

  var cells = '';
  // Empty cells before day 1
  for(var i=0;i<firstMon;i++) cells += '<div></div>';

  for(var d=1;d<=daysInMonth;d++){
    var ds = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var dayEntries = dayMap[ds]||[];
    var isToday = ds===todayStr;
    var isPast  = ds < todayStr;
    var hasBlock = dayEntries.some(function(e){return TYPE_CFG[e.type]&&TYPE_CFG[e.type].blocks;});
    var dayType  = dayEntries.length ? dayEntries[0].type : null;
    var cfg      = dayType ? TYPE_CFG[dayType] : null;

    var bg = cfg ? cfg.bg : 'var(--white)';
    var border = isToday ? '2px solid var(--pink)' : '1.5px solid var(--border)';
    var opacity = isPast ? '.55' : '1';
    var icons = dayEntries.map(function(e){ return TYPE_CFG[e.type]?TYPE_CFG[e.type].icon:''; }).join('');

    cells += '<div onclick="schDayClick(\''+ds+'\')" style="aspect-ratio:1;border-radius:var(--r-sm);border:'+border
      +';background:'+bg+';cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all .1s;opacity:'+opacity
      +';position:relative;overflow:hidden;min-height:34px" '
      +'onmouseover="this.style.boxShadow=\'0 0 0 2px var(--pink)\'" onmouseout="this.style.boxShadow=\'\'">'
      +'<div style="font-size:.72rem;font-weight:'+(isToday?'800':'500')+';color:'+(isToday?'var(--pink)':'var(--text)')+'">'+d+'</div>'
      +(icons?'<div style="font-size:.65rem;line-height:1">'+icons+'</div>':'')
      +(hasBlock&&dayType!=='busy_hours'?'':dayEntries.some(function(e){return e.type==='busy_hours';})?'<div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--amber)"></div>':'')
      +'</div>';
  }

  document.getElementById('sch-cal-grid').innerHTML = cells;

  // Highlight vacation range on calendar
  var selType = document.getElementById('sch-type')?document.getElementById('sch-type').value:'';
  if(selType==='vacation'){
    var selFrom = document.getElementById('sch-range-from')?document.getElementById('sch-range-from').value:'';
    var selTo   = document.getElementById('sch-range-to')?document.getElementById('sch-range-to').value:'';
    if(selFrom){
      var cells2 = document.getElementById('sch-cal-grid').children;
      Array.from(cells2).forEach(function(cell,idx){
        var day = idx - firstMon + 1;
        if(day < 1 || day > daysInMonth) return;
        var ds2 = year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
        if(ds2===selFrom) cell.style.outline='2px solid var(--pink)';
        if(selTo && ds2>selFrom && ds2<=selTo){
          if(!dayMap[ds2]||!dayMap[ds2].length) cell.style.background='rgba(124,58,237,.12)';
          cell.style.outline='1px solid rgba(124,58,237,.3)';
        }
        if(ds2===selTo) cell.style.outline='2px solid var(--violet)';
      });
    }
  }

  // Event list for this month
  var prefix = year+'-'+String(month+1).padStart(2,'0');
  var monthEntries = entries.filter(function(e){ return e.date && e.date.startsWith(prefix); })
    .sort(function(a,b){return a.date.localeCompare(b.date);});

  document.getElementById('sch-month-count').textContent = monthEntries.length+' entries';

  var listHtml = '';
  if(!monthEntries.length){
    listHtml = '<div style="padding:1.5rem;text-align:center;color:var(--text3);font-size:.78rem">No entries this month</div>';
  } else {
    monthEntries.forEach(function(e,idx){
      var cfg2 = TYPE_CFG[e.type]||{label:e.type,icon:'📅',color:'#666',bg:'#f5f5f5'};
      var dateStr = new Date(e.date+'T12:00:00').toLocaleDateString('en-CA',{weekday:'short',month:'short',day:'numeric'});
      listHtml += '<div style="display:flex;align-items:flex-start;gap:.5rem;padding:.45rem .5rem;border-radius:var(--r-sm);border:1px solid var(--border);margin-bottom:.35rem;background:'+cfg2.bg+'">'
        +'<div style="font-size:1rem;margin-top:1px">'+cfg2.icon+'</div>'
        +'<div style="flex:1;min-width:0">'
        +'<div style="font-size:.72rem;font-weight:700;color:'+cfg2.color+'">'+cfg2.label+'</div>'
        +'<div style="font-size:.67rem;color:var(--text2)">'+dateStr+(e.from&&e.to?' · '+e.from+'–'+e.to:'')+'</div>'
        +(e.note?'<div style="font-size:.65rem;color:var(--text3)">'+e.note+'</div>':'')
        +'</div>'
        +'<button onclick="removeSchEntry(\''+e.id+'\')" style="width:20px;height:20px;border-radius:4px;border:none;background:rgba(220,38,38,.12);color:var(--red);cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;flex-shrink:0">×</button>'
        +'</div>';
    });
  }
  document.getElementById('sch-event-list').innerHTML = listHtml;
}

function schDayClick(dateStr){
  var type = document.getElementById('sch-type').value;
  if(type === 'vacation'){
    var from = document.getElementById('sch-range-from').value;
    var to   = document.getElementById('sch-range-to').value;
    if(!from || (from && to)){
      // Start fresh: set from, clear to
      document.getElementById('sch-range-from').value = dateStr;
      document.getElementById('sch-range-to').value   = '';
      document.getElementById('sch-day-preview').style.display = 'none';
    } else {
      // from is set, set to (ensure to >= from)
      if(dateStr >= from){
        document.getElementById('sch-range-to').value = dateStr;
      } else {
        // Clicked before from — swap
        document.getElementById('sch-range-to').value   = from;
        document.getElementById('sch-range-from').value = dateStr;
      }
      schCalcDays();
    }
    // Highlight selection on calendar
    renderSchCalendar();
  } else {
    document.getElementById('sch-date').value = dateStr;
  }
}

function schPrevMonth(){ if(SCH_MONTH===0){SCH_MONTH=11;SCH_YEAR--;} else SCH_MONTH--; renderSchCalendar(); }
function schNextMonth(){ if(SCH_MONTH===11){SCH_MONTH=0;SCH_YEAR++;} else SCH_MONTH++; renderSchCalendar(); }

function addScheduleEntry(){
  var type  = document.getElementById('sch-type').value;
  var note  = document.getElementById('sch-note').value.trim();
  var from  = document.getElementById('sch-from').value;
  var to    = document.getElementById('sch-to').value;
  var cfg   = TYPE_CFG[type];

  if(type === 'vacation'){
    // ── VACATION: date range ──
    var rangeFrom = document.getElementById('sch-range-from').value;
    var rangeTo   = document.getElementById('sch-range-to').value;
    if(!rangeFrom||!rangeTo){ Utils.toast('Please select start and end date','warning'); return; }
    if(rangeTo < rangeFrom){ Utils.toast('End date must be after start date','error'); return; }

    // Build list of working days in range (skip Sundays)
    var days = [];
    var cur = new Date(rangeFrom+'T12:00:00');
    var end = new Date(rangeTo+'T12:00:00');
    while(cur <= end){
      if(cur.getDay() !== 0){ // skip Sunday
        days.push(cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0'));
      }
      cur.setDate(cur.getDate()+1);
    }

    // Check balance
    var bal = getVacationBalance(SCH_STAFF_ID);
    if(days.length > bal.remaining){
      Utils.toast('Not enough vacation days. Need '+days.length+', have '+bal.remaining,'error'); return;
    }

    // Add one entry per day
    var entries = getSchedule(SCH_STAFF_ID);
    var existing = entries.map(function(e){return e.date;});
    var added = 0;
    days.forEach(function(ds){
      if(existing.indexOf(ds) === -1){ // skip if already has entry
        entries.push({id:'sch_'+Date.now()+'_'+added, date:ds, type:'vacation', note:note||'Vacation', from:'', to:''});
        added++;
      }
    });
    saveSchedule(SCH_STAFF_ID, entries);

    // Navigate to start month
    var startD = new Date(rangeFrom+'T12:00:00');
    SCH_MONTH = startD.getMonth();
    SCH_YEAR  = startD.getFullYear();

    document.getElementById('sch-note').value = '';
    document.getElementById('sch-day-preview').style.display = 'none';
    Utils.toast('🌴 '+added+' vacation days added ('+days.length+' deducted from balance)','success');

  } else {
    // ── SINGLE DAY / BUSY HOURS ──
    var date = document.getElementById('sch-date').value;
    if(!date){ Utils.toast('Please select a date','warning'); return; }
    if(type==='busy_hours'&&(!from||!to)){ Utils.toast('Please enter time range','warning'); return; }
    if(type==='busy_hours'&&from>=to){ Utils.toast('End time must be after start time','error'); return; }

    // Check balance for day_off
    if(cfg.deducts){
      var bal2 = getVacationBalance(SCH_STAFF_ID);
      if(bal2.remaining<=0){ Utils.toast('No vacation days remaining for '+SCH_YEAR,'error'); return; }
      var existing2 = getSchedule(SCH_STAFF_ID);
      if(existing2.some(function(e){return e.date===date&&(e.type==='vacation'||e.type==='day_off');})){
        Utils.toast('Already has a time-off entry on this date','warning'); return;
      }
    }

    var entry = {id:'sch_'+Date.now(), date:date, type:type, note:note||'', from:type==='busy_hours'?from:'', to:type==='busy_hours'?to:''};
    var entries = getSchedule(SCH_STAFF_ID);
    entries.push(entry);
    saveSchedule(SCH_STAFF_ID, entries);

    var d = new Date(date+'T12:00:00');
    SCH_MONTH = d.getMonth();
    SCH_YEAR  = d.getFullYear();
    document.getElementById('sch-note').value = '';
    Utils.toast(cfg.icon+' '+cfg.label+' added'+(cfg.deducts?' (1 vacation day deducted)':''),'success');
  }

  renderSchCalendar();
  updateBookingBlocks();
}

function removeSchEntry(id){
  var entries = getSchedule(SCH_STAFF_ID).filter(function(e){return e.id!==id;});
  saveSchedule(SCH_STAFF_ID, entries);
  renderSchCalendar();
  updateBookingBlocks();
  Utils.toast('Entry removed','info');
}

// ── Export schedule blocks to a format booking.html can read ──
function updateBookingBlocks(){
  // Build a combined block map for ALL staff and save to localStorage
  var blockMap = {};
  STAFF_CFG.forEach(function(s){
    var entries = getSchedule(s.id);
    entries.forEach(function(e){
      var cfg = TYPE_CFG[e.type];
      if(!cfg||!cfg.blocks) return; // only blocking types
      var key = s.name+'|'+e.date;
      if(!blockMap[key]) blockMap[key]=[];
      blockMap[key].push({type:e.type, from:e.from, to:e.to, note:e.note});
    });
  });
  localStorage.setItem('mn_booking_blocks', JSON.stringify(blockMap));
}

// ── Called from staff detail: open schedule for a specific staff ──
function openStaffSchedule(staffId){
  openScheduleManager(staffId);
}

// Expose globally
window.openScheduleManager = openScheduleManager;
window.openStaffSchedule = openStaffSchedule;
</script>

</body>
</html>
