<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>March Nails — Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="css/core.css"><link rel="stylesheet" href="css/components.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="js/supabase.js"></script><script src="js/utils.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand"><div class="brand-name">March <span>Nails</span></div><div class="brand-sub">Business Intelligence</div></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Analytics</div>
      <a class="nav-item" href="dashboard.html"><i class="fa-solid fa-gauge-high"></i>Dashboard</a>
      <a class="nav-item" href="booking.html"><i class="fa-solid fa-calendar-check"></i>Booking</a>
      <a class="nav-item" href="reports.html"><i class="fa-solid fa-chart-column"></i>Reports</a>
      <a class="nav-item" href="clients.html"><i class="fa-solid fa-users"></i>Clients</a>
      <a class="nav-item active" href="staff.html"><i class="fa-solid fa-id-badge"></i>Staff</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">A</div>
        <div><div class="user-name">Admin</div><div class="user-role">Salon Owner</div></div>
        <button class="btn btn-ghost btn-icon" onclick="localStorage.removeItem('mn_auth');location.href='index.html'" style="margin-left:auto" title="Sign out"><i class="fa-solid fa-right-from-bracket" style="font-size:.8rem;color:var(--text3)"></i></button>
      </div>
    </div>
  </aside>
  <div class="main-area">
    <div class="topbar">
      <button class="btn btn-ghost btn-icon" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-title" id="page-title">Staff Performance</div>
      <div class="topbar-date" id="tb-date"></div>
    </div>
    <div class="page-content" id="page-content">
      <!-- Loaded dynamically -->
    </div>
  </div>
</div>
<div id="toast-container"></div>
<script>
'use strict';
if (!localStorage.getItem('mn_auth')) location.href='index.html';

var STAFF_CFG = [
  {name:'Happy', role:'Acrylic & Nail Art',    color:'#E91E8C', grad:'linear-gradient(135deg,#E91E8C,#C9184A)'},
  {name:'Flower',role:'Gel Extensions & Ombré', color:'#7C3AED', grad:'linear-gradient(135deg,#7C3AED,#4F46E5)'},
  {name:'Daisy', role:'Shellac & Chrome',       color:'#0891B2', grad:'linear-gradient(135deg,#06B6D4,#0284C7)'},
  {name:'Hannah',role:'Pedicure Specialist',    color:'#D97706', grad:'linear-gradient(135deg,#D97706,#B45309)'},
];

var STATE = {view:'overview', selectedStaff:null, period:'this_month', customStart:null, customEnd:null, svcFilter:'all'};

window.addEventListener('DOMContentLoaded', function() {
  Utils.startClock(null, document.getElementById('tb-date'));
  if (!SB.loadCacheFromStorage()) {
    if (SB.DEMO) {
      SB.CACHE.clients=JSON.parse(JSON.stringify(SB.DEMO.clients));
      SB.CACHE.payments=JSON.parse(JSON.stringify(SB.DEMO.payments));
      SB.CACHE.bookings=JSON.parse(JSON.stringify(SB.DEMO.bookings));
      SB.CACHE.email_log=JSON.parse(JSON.stringify(SB.DEMO.email_log));
      SB.saveCache();
    }
  }
  if (window.location.protocol !== 'file:') SB.loadAll().then(function(){SB.saveCache();renderPage();}).catch(function(){});
  renderPage();
});

function renderPage(){
  if (STATE.selectedStaff) renderStaffDetail(STATE.selectedStaff);
  else renderOverview();
}

/* ── OVERVIEW ── */
function renderOverview(){
  document.getElementById('page-title').textContent='Staff Performance';
  var range=Utils.getRange(STATE.period,STATE.customStart,STATE.customEnd);
  var html='';
  // Period filter
  html+='<div class="filter-bar" style="margin-bottom:1rem"><span class="filter-bar-label"><i class="fa-solid fa-filter" style="color:var(--pink)"></i></span>'
    +'<div class="filter-group">'
    +['today','yesterday','7d','this_month','last_month','this_year'].map(function(p){
      return '<button class="period-pill'+(STATE.period===p?' active':'')+'" onclick="STATE.period=\''+p+'\';renderPage()">'+
        ({today:'Today',yesterday:'Yesterday','7d':'7 Days',this_month:'This Month',last_month:'Last Month',this_year:'This Year'}[p])+'</button>';
    }).join('')+'</div></div>';

  // Staff cards grid
  html+='<div class="grid grid-4 mb-1">';
  STAFF_CFG.forEach(function(sc){
    var analytics=Utils.staffAnalytics(sc.name,SB.CACHE.bookings,SB.CACHE.payments);
    var p=analytics[STATE.period]||analytics.this_month;
    var all=analytics.all;
    html+='<div class="card" style="cursor:pointer;transition:transform .15s,box-shadow .15s" onclick="openStaff(\''+sc.name+'\')" onmouseover="this.style.transform=\'translateY(-3px)\';this.style.boxShadow=\'0 8px 24px rgba(0,0,0,.12)\'" onmouseout="this.style.transform=\'\';this.style.boxShadow=\'\'">'
      +'<div style="display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem">'
      +'<div style="width:44px;height:44px;border-radius:50%;background:'+sc.grad+';display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:#fff">'+sc.name[0]+'</div>'
      +'<div><div style="font-size:.9rem;font-weight:700">'+sc.name+'</div><div style="font-size:.7rem;color:var(--text2)">'+sc.role+'</div></div>'
      +'<div style="margin-left:auto"><i class="fa-solid fa-arrow-right" style="color:var(--text3);font-size:.8rem"></i></div></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.75rem">'
      +kpiMini('Revenue',Utils.fCurrency(p.revenue),sc.color)
      +kpiMini('Bookings',p.bookings,sc.color)
      +kpiMini('Completed',p.completed,sc.color)
      +kpiMini('Avg Ticket',Utils.fCurrency(p.avgTicket),sc.color)+'</div>'
      +'<div style="height:4px;background:var(--s1);border-radius:4px;overflow:hidden;margin-bottom:.5rem">'
      +'<div style="height:100%;border-radius:4px;background:'+sc.grad+';width:'+Math.min(100,Math.round((p.completed/(p.bookings||1))*100))+'%"></div></div>'
      +'<div style="display:flex;justify-content:space-between;font-size:.68rem;color:var(--text2)">'
      +'<span>'+Math.round((p.completed/(p.bookings||1))*100)+'% completion</span>'
      +'<span>'+analytics.totalClients+' clients</span></div></div>';
  });
  html+='</div>';

  // Comparison table
  html+='<div class="card"><div class="card-header"><div class="card-title">Staff Comparison</div></div>'
    +'<div class="table-wrap"><table class="data-table" id="staff-cmp-table">'
    +'<thead><tr><th>Staff</th><th>Bookings</th><th>Completed</th><th>No-shows</th><th>Cancelled</th><th>Revenue</th><th>Commission</th><th>Net</th><th>Avg Ticket</th><th>Completion%</th></tr></thead><tbody>';
  STAFF_CFG.forEach(function(sc){
    var a=Utils.staffAnalytics(sc.name,SB.CACHE.bookings,SB.CACHE.payments);
    var p=a[STATE.period]||a.this_month;
    html+='<tr style="cursor:pointer" onclick="openStaff(\''+sc.name+'\')">'
      +'<td><div style="display:flex;align-items:center;gap:6px"><div style="width:22px;height:22px;border-radius:50%;background:'+sc.grad+';display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff">'+sc.name[0]+'</div>'+sc.name+'</div></td>'
      +'<td>'+p.bookings+'</td><td class="td-pos">'+p.completed+'</td>'
      +'<td '+(p.noshow>0?'class="td-neg"':'')+'>'+p.noshow+'</td>'
      +'<td class="td-muted">'+p.cancelled+'</td>'
      +'<td class="td-pos">'+Utils.fCurrency(p.revenue)+'</td>'
      +'<td style="color:var(--pink);font-weight:600">'+Utils.fCurrency(p.commission)+'</td>'
      +'<td class="td-pos">'+Utils.fCurrency(p.netRevenue)+'</td>'
      +'<td>'+Utils.fCurrency(p.avgTicket)+'</td>'
      +'<td>'+Math.round((p.completed/(p.bookings||1))*100)+'%</td></tr>';
  });
  html+='</tbody></table></div></div>';

  document.getElementById('page-content').innerHTML=html;
  Utils.makeSortable(document.getElementById('staff-cmp-table'));
}

function kpiMini(lbl,val,color){
  return '<div style="background:var(--s1);border-radius:6px;padding:.4rem .55rem">'
    +'<div style="font-size:.58rem;color:var(--text2);margin-bottom:1px">'+lbl+'</div>'
    +'<div style="font-size:.82rem;font-weight:700;color:'+color+'">'+val+'</div></div>';
}

/* ── STAFF DETAIL ── */
function openStaff(name){STATE.selectedStaff=name;STATE.period='this_month';renderStaffDetail(name);}
function backToOverview(){STATE.selectedStaff=null;renderOverview();}

function renderStaffDetail(name){
  var sc=STAFF_CFG.find(function(s){return s.name===name;});
  if(!sc)return;
  document.getElementById('page-title').innerHTML='<button onclick="backToOverview()" style="background:none;border:none;cursor:pointer;color:var(--text2);font-size:.8rem;margin-right:.5rem"><i class="fa-solid fa-arrow-left"></i></button> '+name;

  var range=Utils.getRange(STATE.period,STATE.customStart,STATE.customEnd);
  var analytics=Utils.staffAnalytics(name,SB.CACHE.bookings,SB.CACHE.payments);
  var p=analytics[STATE.period]||analytics.this_month;
  var all=analytics.all;

  var html='';

  // Filters
  html+='<div class="filter-bar" style="margin-bottom:1rem">'
    +'<span class="filter-bar-label"><i class="fa-solid fa-filter" style="color:var(--pink)"></i></span>'
    +'<div class="filter-group">'
    +[['today','Today'],['yesterday','Yesterday'],['7d','7 Days'],['this_month','This Month'],['last_month','Last Month'],['this_year','This Year'],['all','All Time']].map(function(x){
      return '<button class="period-pill'+(STATE.period===x[0]?' active':'')+'" onclick="STATE.period=\''+x[0]+'\';renderStaffDetail(\''+name+'\')">'+x[1]+'</button>';
    }).join('')+'</div>'
    +'<div class="filter-sep"></div>'
    +'<select class="filter-select" onchange="STATE.svcFilter=this.value;renderStaffDetail(\''+name+'\')">'
    +'<option value="all">All Services</option>'
    +['Acrylic Full Set','Acrylic Refill','Gel-X Extensions','Pedicure Shellac','Manicure Shellac','Lash Extensions','Nail Art'].map(function(s){return '<option'+(STATE.svcFilter===s?' selected':'')+'>'+s+'</option>';}).join('')
    +'</select></div>';

  // Header card
  html+='<div class="card mb-1" style="background:linear-gradient(135deg,'+sc.color+'15,'+sc.color+'05);border:1.5px solid '+sc.color+'30">'
    +'<div style="display:flex;align-items:center;gap:1rem">'
    +'<div style="width:60px;height:60px;border-radius:50%;background:'+sc.grad+';display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;color:#fff">'+sc.name[0]+'</div>'
    +'<div><div style="font-family:\'Syne\',sans-serif;font-size:1.2rem;font-weight:700">'+sc.name+'</div>'
    +'<div style="font-size:.8rem;color:var(--text2)">'+sc.role+'</div>'
    +'<div style="font-size:.72rem;color:var(--text2);margin-top:2px">'+analytics.totalClients+' total clients · '+analytics.totalBookings+' total bookings</div></div>'
    +'<div style="margin-left:auto;display:flex;gap:.5rem">'
    +'<div style="text-align:center;background:white;border-radius:var(--r);padding:.6rem .85rem;min-width:80px">'
    +'<div style="font-size:1rem;font-weight:700;color:'+sc.color+'">'+Utils.fCurrency(all.revenue)+'</div>'
    +'<div style="font-size:.62rem;color:var(--text2)">Lifetime Revenue</div></div>'
    +'<div style="text-align:center;background:white;border-radius:var(--r);padding:.6rem .85rem;min-width:80px">'
    +'<div style="font-size:1rem;font-weight:700;color:var(--pink)">'+Utils.fCurrency(all.commission)+'</div>'
    +'<div style="font-size:.62rem;color:var(--text2)">Lifetime Commission</div></div>'
    +'</div></div></div>';

  // KPI row - period breakdown
  var periods = [
    {key:'today',lbl:'Today'},
    {key:'yesterday',lbl:'Yesterday'},
    {key:'this_week',lbl:'This Week'},
    {key:'this_month',lbl:'This Month'},
    {key:'last_month',lbl:'Last Month'},
    {key:'this_year',lbl:'This Year'},
  ];
  html+='<div class="grid grid-4 mb-1">';
  [{l:'Revenue',v:Utils.fCurrency(p.revenue),c:'var(--pink)',ic:'fa-money-bill-trend-up'},
   {l:'Bookings',v:p.bookings,c:'var(--violet)',ic:'fa-calendar-check'},
   {l:'Completed',v:p.completed,c:'var(--green)',ic:'fa-check-circle'},
   {l:'Commission',v:Utils.fCurrency(p.commission),c:'#E91E8C',ic:'fa-hand-holding-dollar'},
   {l:'Net Revenue',v:Utils.fCurrency(p.netRevenue),c:'var(--green)',ic:'fa-chart-line'},
   {l:'Avg Ticket',v:Utils.fCurrency(p.avgTicket),c:'var(--blue)',ic:'fa-ticket'},
   {l:'No-shows',v:p.noshow,c:'var(--red)',ic:'fa-user-slash'},
   {l:'Cancelled',v:p.cancelled,c:'var(--text2)',ic:'fa-ban'},
  ].forEach(function(k){
    html+='<div class="kpi-card" style="--kpi-color:'+k.c+'"><div class="kpi-icon"><i class="fa-solid '+k.ic+'"></i></div><div class="kpi-value">'+k.v+'</div><div class="kpi-label">'+k.l+'</div></div>';
  });
  html+='</div>';

  // Period breakdown table
  html+='<div class="grid grid-2 mb-1">';
  html+='<div class="card"><div class="card-header"><div class="card-title">Period Breakdown</div></div>'
    +'<div class="table-wrap"><table class="data-table"><thead><tr><th>Period</th><th>Bookings</th><th>Revenue</th><th>Commission</th></tr></thead><tbody>';
  periods.forEach(function(per){
    var pd=analytics[per.key]||{bookings:0,revenue:0,commission:0};
    var active=STATE.period===per.key;
    html+='<tr style="'+(active?'background:var(--pink-bg);font-weight:600':'')+'">'
      +'<td>'+per.lbl+'</td><td>'+pd.bookings+'</td>'
      +'<td class="td-pos">'+Utils.fCurrency(pd.revenue)+'</td>'
      +'<td style="color:var(--pink)">'+Utils.fCurrency(pd.commission)+'</td></tr>';
  });
  html+='</tbody></table></div></div>';

  // Top services
  html+='<div class="card"><div class="card-header"><div class="card-title">Top Services</div></div>'
    +'<div style="padding:.25rem 0">';
  analytics.topServices.forEach(function(sv,i){
    var w=analytics.topServices[0]?Math.round((sv.count/analytics.topServices[0].count)*100):0;
    html+='<div style="display:flex;align-items:center;gap:.6rem;padding:.45rem .75rem;border-bottom:1px solid var(--s1)">'
      +'<div style="width:18px;height:18px;border-radius:50%;background:'+sc.grad+';display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:700;color:#fff">'+(i+1)+'</div>'
      +'<div style="flex:1;min-width:0"><div style="font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+sv.name+'</div>'
      +'<div style="height:4px;background:var(--s1);border-radius:2px;overflow:hidden;margin-top:3px"><div style="width:'+w+'%;height:100%;background:'+sc.grad+';border-radius:2px"></div></div></div>'
      +'<div style="font-size:.75rem;font-weight:600">'+sv.count+'</div></div>';
  });
  html+='</div></div></div>';

  // Recent bookings table
  var staffBks=Utils.filterBookings(SB.CACHE.bookings,{staff:name,range:range,service:STATE.svcFilter});
  html+='<div class="card"><div class="card-header"><div class="card-title">Appointments — '+(STATE.period.replace('_',' ').replace(/\b\w/g,function(c){return c.toUpperCase();}))+'</div>'
    +'<div class="table-info">'+staffBks.length+' appointments</div></div>'
    +'<div class="table-wrap"><table class="data-table" id="staff-bk-table">'
    +'<thead><tr><th>Date</th><th>Time</th><th>Client</th><th>Service</th><th>Price</th><th>Status</th><th>Payment</th></tr></thead><tbody>';
  var SM2={pending:'badge-orange',confirmed:'badge-blue',arrived:'badge-green',in_progress:'badge-violet',completed:'badge-green',cancelled:'badge-grey','no-show':'badge-red',no_show:'badge-red'};
  staffBks.slice(0,100).sort(function(a,b){return new Date(b.booked_at)-new Date(a.booked_at);}).forEach(function(b){
    var dt=new Date(b.booked_at);
    html+='<tr><td class="td-muted">'+Utils.fDate(b.booked_at,{month:'short',day:'numeric',year:'numeric'})+'</td>'
      +'<td>'+dt.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})+'</td>'
      +'<td class="tds">'+(b.client_name||'—')+'</td>'
      +'<td class="td-muted">'+(b.service_name||'—')+'</td>'
      +'<td class="td-pos">'+Utils.fCurrency(b.service_price||0)+'</td>'
      +'<td><span class="badge badge-'+((SM2[b.status])||'badge-grey')+'">'+(b.status||'—').replace('_',' ')+'</span></td>'
      +'<td class="td-muted">'+(b.payment_status==='paid'?'<span style="color:var(--green)">Paid</span>':'Unpaid')+'</td></tr>';
  });
  if(!staffBks.length)html+='<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text3)">No appointments in this period</td></tr>';
  html+='</tbody></table></div></div>';

  document.getElementById('page-content').innerHTML=html;
  Utils.makeSortable(document.getElementById('staff-bk-table'));
}
</script>
</body>
</html>
